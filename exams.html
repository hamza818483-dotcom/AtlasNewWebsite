<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exams | ATLAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>body { font-family: 'Hind Siliguri', sans-serif; background-color: #f3f7fa; }</style>
</head>
<body>
    <nav class="bg-white p-4 shadow-sm font-black text-blue-800 sticky top-0 z-50 flex items-center">
        <button onclick="history.back()" class="mr-4 text-xl">←</button> ATLAS EXAMS
    </nav>
    <div id="examList" class="p-6 space-y-4"></div>
    <script>
        const SUPABASE_URL = 'https://gdmhswxnlhvtyfxaevnt.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkbWhzd3hubGh2dHlmeGFldm50Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MjQyMTQsImV4cCI6MjA5MzIwMDIxNH0.0vDkuK0s6dIYWsgPmvfXXPyalpHNqkm3J--kbhck2PI';
        const atlas = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        async function load() {
            const { data } = await atlas.from('exams').select('*');
            document.getElementById('examList').innerHTML = data.map(e => {
                const link = e.type === 'csv' ? `exam-hall.html?id=${e.id}` : e.ext_link;
                return `
                <div class="bg-white p-5 rounded-[2.5rem] shadow-sm border font-bold">
                    <p class="text-xs text-green-600 mb-1 uppercase tracking-tighter">${e.type} Exam</p>
                    <h3 class="text-blue-900">${e.subject} | ${e.chapter}</h3>
                    <a href="${link}" class="block bg-blue-700 text-white text-center py-3 rounded-2xl mt-4 text-sm">Start Exam</a>
                </div>`;
            }).join('');
        } load();
    </script>
</body>
</html>
