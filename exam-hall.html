<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS | Add Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background: #f0f4f8; }
        .input-box { width: 100%; padding: 15px; border-radius: 20px; border: 1px solid #e2e8f0; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-xl mx-auto bg-white p-8 rounded-[2.5rem] shadow-xl">
        <h2 class="text-2xl font-black text-blue-900 mb-6 italic uppercase">Create New Exam 📝</h2>
        
        <input type="text" id="examSubject" placeholder="Subject (e.g. Biology)" class="input-box">
        <input type="text" id="examPaper" placeholder="Paper (e.g. 1st Paper)" class="input-box">
        <input type="text" id="examChapter" placeholder="Chapter (e.g. Cell & Its Structure)" class="input-box">
        <textarea id="examDesc" placeholder="Exam Description/Instructions" class="input-box h-24"></textarea>
        
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Date & Time</label>
                <input type="datetime-local" id="examDateTime" class="input-box">
            </div>
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Total Time (Min)</label>
                <input type="number" id="examDuration" placeholder="e.g. 20" class="input-box">
            </div>
        </div>

        <div class="flex space-x-2 mb-6">
            <button onclick="toggleType('csv')" id="csvBtn" class="flex-1 py-3 rounded-2xl font-bold bg-blue-800 text-white shadow-lg">CSV Upload</button>
            <button onclick="toggleType('link')" id="linkBtn" class="flex-1 py-3 rounded-2xl font-bold bg-gray-100 text-gray-500">External Link</button>
        </div>

        <div id="csvSection">
            <div class="border-2 border-dashed p-6 rounded-3xl text-center mb-6">
                <input type="file" id="csvFile" accept=".csv" class="text-xs">
                <p class="text-[10px] text-gray-400 mt-2">Format: questions, option1-4, option5, answer, exp, type, section</p>
            </div>
        </div>

        <div id="linkSection" class="hidden">
            <input type="url" id="externalUrl" placeholder="Paste External Exam Link" class="input-box">
        </div>

        <button onclick="publishExam()" id="pubBtn" class="w-full bg-blue-900 text-white py-5 rounded-3xl font-black uppercase tracking-widest shadow-xl">Publish & Get Link</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://gdmhswxnlhvtyfxaevnt.supabase.co';
        const SUPABASE_KEY = 'YOUR_KEY_HERE'; // আপনার কী বসান
        const atlas = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let examType = 'csv';

        function toggleType(type) {
            examType = type;
            if(type === 'csv') {
                document.getElementById('csvSection').classList.remove('hidden');
                document.getElementById('linkSection').classList.add('hidden');
                document.getElementById('csvBtn').className = "flex-1 py-3 rounded-2xl font-bold bg-blue-800 text-white shadow-lg";
                document.getElementById('linkBtn').className = "flex-1 py-3 rounded-2xl font-bold bg-gray-100 text-gray-500";
            } else {
                document.getElementById('linkSection').classList.remove('hidden');
                document.getElementById('csvSection').classList.add('hidden');
                document.getElementById('linkBtn').className = "flex-1 py-3 rounded-2xl font-bold bg-blue-800 text-white shadow-lg";
                document.getElementById('csvBtn').className = "flex-1 py-3 rounded-2xl font-bold bg-gray-100 text-gray-500";
            }
        }

        async function publishExam() {
            const btn = document.getElementById('pubBtn');
            btn.innerText = "PROCESSING...";
            
            let questions = [];
            if(examType === 'csv') {
                const file = document.getElementById('csvFile').files[0];
                if(!file) return alert("Select CSV File!");
                questions = await parseCSV(file);
                alert("Upload Successfully!");
            }

            const examData = {
                subject: examSubject.value,
                paper: examPaper.value,
                chapter: examChapter.value,
                description: examDesc.value,
                date_time: examDateTime.value,
                duration: examDuration.value,
                type: examType,
                external_link: externalUrl.value,
                questions: questions // JSON হিসেবে সেভ হবে
            };

            const { data, error } = await atlas.from('exams').insert([examData]).select();
            if(!error) {
                const examId = data[0].id;
                prompt("Exam Live! Copy this link:", window.location.origin + "/exam-hall.html?id=" + examId);
                location.reload();
            }
        }

        function parseCSV(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const lines = e.target.result.split('\n').slice(1);
                    const result = lines.filter(l => l.trim()).map(line => {
                        const cols = line.split(','); // এখানে আপনার ক্লিন টেক্সট লজিক কাজ করবে
                        return {
                            question: cols[0], opt1: cols[1], opt2: cols[2], opt3: cols[3], opt4: cols[4],
                            opt5: cols[5], answer: cols[6], explanation: cols[7], type: cols[8], section: cols[9]
                        };
                    });
                    resolve(result);
                };
                reader.readAsText(file);
            });
        }
    </script>
</body>
</html>
