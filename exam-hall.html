<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATLAS Exam Hall</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .option { transition: all 0.2s; }
    .option.selected { background-color: #10b981; color: white; }
    .nav-btn { transition: all 0.2s; }
    .answered { background-color: #10b981; color: white; }
  </style>
</head>
<body class="bg-gray-100">
  <div class="max-w-6xl mx-auto flex h-screen">

    <!-- Main Question Area -->
    <div class="flex-1 flex flex-col">
      <!-- Header -->
      <div class="bg-white border-b p-4 flex justify-between items-center">
        <h1 class="text-xl font-bold" id="examTitle">ATLAS Smart Exam</h1>
        <div class="text-red-600 font-mono text-xl font-bold" id="timer">60:00</div>
      </div>

      <!-- Question -->
      <div class="flex-1 p-8 overflow-auto" id="questionArea">
        <div class="mb-4">
          <span class="text-sm text-gray-500">প্রশ্ন <span id="currentQ" class="font-bold">1</span> / <span id="totalQ">0</span></span>
        </div>
        <h2 class="text-2xl font-medium mb-8" id="questionText"></h2>

        <div class="space-y-3" id="options"></div>
      </div>

      <!-- Fixed Footer -->
      <div class="bg-white border-t p-4 flex justify-between items-center">
        <button onclick="prevQuestion()" 
                class="px-6 py-3 bg-gray-200 hover:bg-gray-300 rounded-lg">পূর্ববর্তী</button>
        
        <button onclick="nextQuestion()" 
                class="px-6 py-3 bg-blue-600 text-white hover:bg-blue-700 rounded-lg">পরবর্তী</button>
        
        <button onclick="submitExam()" 
                class="px-8 py-3 bg-red-600 text-white hover:bg-red-700 rounded-lg font-semibold">
          পরীক্ষা জমা দিন
        </button>
      </div>
    </div>

    <!-- Navigation Sidebar -->
    <div class="w-72 bg-white border-l p-4 overflow-auto">
      <h3 class="font-bold mb-4">প্রশ্ন নেভিগেশন</h3>
      <div class="grid grid-cols-5 gap-2" id="navBox"></div>
      
      <div class="mt-8 text-sm">
        <div class="flex items-center gap-2 mb-2">
          <div class="w-5 h-5 bg-green-500 rounded"></div>
          <span>উত্তর দেওয়া হয়েছে</span>
        </div>
        <div class="flex items-center gap-2">
          <div class="w-5 h-5 border-2 border-gray-400 rounded"></div>
          <span>এখনো বাকি</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentExam = null;
    let currentQuestionIndex = 0;
    let answers = {};           // {questionId: selectedOption}
    let locked = {};            // লক করা অপশন
    let timeLeft = 3600;        // ডিফল্ট ৬০ মিনিট (সেকেন্ডে)
    let timerInterval;

    // URL থেকে Exam ID নেওয়া
    const params = new URLSearchParams(window.location.search);
    const examId = params.get('examId');

    // ==================== লোড এক্সাম ====================
    function loadExam() {
      const allExams = JSON.parse(localStorage.getItem('atlas_exams') || '[]');
      currentExam = allExams.find(ex => ex.examId === examId) || allExams[0];

      if (!currentExam) {
        alert("পরীক্ষা পাওয়া যায়নি!");
        return;
      }

      document.getElementById('examTitle').textContent = currentExam.title || "ATLAS Exam";
      document.getElementById('totalQ').textContent = currentExam.questions.length;

      // টাইমার সেট (পরে অ্যাডমিন থেকে আনতে পারবে)
      timeLeft = 3600;
      startTimer();

      loadQuestion(0);
      renderNavigation();
    }

    function startTimer() {
      timerInterval = setInterval(() => {
        timeLeft--;
        const min = Math.floor(timeLeft / 60);
        const sec = timeLeft % 60;
        document.getElementById('timer').textContent = 
          `\( {min}: \){sec < 10 ? '0' : ''}${sec}`;

        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          submitExam(true);
        }
      }, 1000);
    }

    // ==================== প্রশ্ন লোড ====================
    function loadQuestion(index) {
      currentQuestionIndex = index;
      const q = currentExam.questions[index];
      
      document.getElementById('currentQ').textContent = index + 1;
      document.getElementById('questionText').textContent = q.question;

      const optionsDiv = document.getElementById('options');
      optionsDiv.innerHTML = '';

      q.options.forEach((opt, i) => {
        const optNum = i + 1;
        const isSelected = answers[q.id] === optNum;
        const isLocked = locked[q.id];

        const btn = document.createElement('button');
        btn.className = `option w-full text-left p-4 border rounded-xl text-lg ${isSelected ? 'selected' : 'hover:bg-gray-50'}`;
        btn.textContent = `${optNum}. ${opt}`;
        btn.disabled = isLocked;
        
        btn.onclick = () => selectOption(q.id, optNum, btn);
        optionsDiv.appendChild(btn);
      });
    }

    function selectOption(qId, optionNum, btn) {
      if (locked[qId]) return;   // লক হয়ে গেলে আর পরিবর্তন হবে না

      answers[qId] = optionNum;
      locked[qId] = true;        // লক করে দিলাম (নতুন ফিচার)
      
      renderNavigation();
      loadQuestion(currentQuestionIndex); // রিফ্রেশ
    }

    // ==================== নেভিগেশন ====================
    function renderNavigation() {
      const navBox = document.getElementById('navBox');
      navBox.innerHTML = '';

      currentExam.questions.forEach((q, i) => {
        const btn = document.createElement('button');
        btn.className = `nav-btn w-10 h-10 rounded-lg border flex items-center justify-center text-sm font-medium
                         ${answers[q.id] ? 'answered' : 'border-gray-300 hover:border-blue-500'}`;
        btn.textContent = i + 1;
        btn.onclick = () => {
          loadQuestion(i);
        };
        navBox.appendChild(btn);
      });
    }

    function nextQuestion() {
      if (currentQuestionIndex < currentExam.questions.length - 1) {
        loadQuestion(currentQuestionIndex + 1);
      }
    }

    function prevQuestion() {
      if (currentQuestionIndex > 0) {
        loadQuestion(currentQuestionIndex - 1);
      }
    }

    // ==================== সাবমিট ====================
    function submitExam(auto = false) {
      if (!auto && !confirm("আপনি কি পরীক্ষা জমা দিতে চান?")) return;

      clearInterval(timerInterval);

      // Result এর জন্য ডাটা সেভ
      const resultData = {
        examId: currentExam.examId,
        answers: answers,
        timeTaken: 3600 - timeLeft,
        submittedAt: new Date().toISOString()
      };

      localStorage.setItem(`result_${currentExam.examId}`, JSON.stringify(resultData));
      
      window.location.href = `../result/result.html?examId=${currentExam.examId}`;
    }

    // লোড হওয়ার সাথে সাথে শুরু
    window.onload = loadExam;
  </script>
</body>
</html>
