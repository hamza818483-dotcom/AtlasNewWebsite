<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS | Live Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background: #f8fafc; scroll-behavior: smooth; }
        .opt { cursor: pointer; transition: 0.2s; border: 2px solid #f1f5f9; border-radius: 1rem; padding: 12px; font-weight: bold; font-size: 14px; background: #fff; margin-bottom: 8px; }
        .selected { border-color: #1e40af; background: #eff6ff; }
        
        /* Navigation Box */
        .nav-box { position: fixed; right: 20px; top: 100px; width: 160px; max-height: 65vh; overflow-y: auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); z-index: 40; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; border: 1px solid #e2e8f0; }
        .nav-btn { width: 100%; aspect-ratio: 1; border-radius: 10px; font-size: 11px; font-weight: 800; background: #f1f5f9; color: #64748b; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .nav-btn.answered { background: #1e40af; color: white; }

        /* Fixed Submit Button */
        .fixed-submit { position: fixed; bottom: 30px; right: 30px; z-index: 50; padding: 16px 35px; border-radius: 30px; font-weight: 900; background: #1e40af; color: white; text-transform: uppercase; box-shadow: 0 10px 20px rgba(30,64,175,0.3); border: none; cursor: pointer; transition: 0.3s; }
        .fixed-submit:hover { transform: scale(1.05); }

        @media (max-width: 1024px) { 
            .nav-box { display: none; } 
            .fixed-submit { right: 5%; width: 90%; bottom: 20px; }
        }
        @media print { .no-print { display: none !important; } body { background: #fff; } }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-32">

    <div id="startScreen" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center p-6 text-center">
        <h1 id="vSubject" class="text-3xl font-black text-blue-900 mb-1">Loading...</h1>
        <p id="vChap" class="text-sm font-bold text-blue-600 mb-6 uppercase tracking-widest italic">Exam Dashboard</p>
        
        <div class="bg-gray-50 p-6 rounded-3xl w-full max-w-sm mb-6 border">
            <p id="vDesc" class="text-sm text-gray-500 font-bold mb-4">নির্দেশনা লোড হচ্ছে...</p>
            <div class="flex justify-around border-t pt-4">
                <div><p class="text-[10px] font-black text-gray-400 uppercase">Time</p><p id="vTime" class="font-black text-blue-800">0 M</p></div>
                <div><p class="text-[10px] font-black text-gray-400 uppercase">Total Qs</p><p id="vCount" class="font-black text-blue-800">0</p></div>
                <div><p class="text-[10px] font-black text-gray-400 uppercase">Negative</p><p id="vNeg" class="font-black text-red-600">0.0</p></div>
            </div>
        </div>
        <button onclick="startExam()" class="w-full max-w-sm bg-blue-900 text-white py-5 rounded-3xl font-black uppercase tracking-widest shadow-xl active:scale-95 transition">Start Exam Hall</button>
    </div>

    <nav class="bg-white/80 backdrop-blur-md p-4 shadow-sm sticky top-0 z-50 flex justify-between items-center px-6 no-print">
        <span class="font-black text-blue-900 italic uppercase">ATLAS Live</span>
        <div id="timer" class="font-black text-red-600 bg-red-50 px-4 py-1.5 rounded-full border border-red-100 text-lg">00:00</div>
    </nav>

    <div id="navBox" class="nav-box no-print scrollbar-hide"></div>

    <main id="qContainer" class="p-4 max-w-3xl lg:ml-12 space-y-6 mt-4"></main>

    <button id="submitBtn" onclick="submitExam()" class="fixed-submit no-print">Submit Exam Script</button>

    <div id="resModal" class="fixed inset-0 bg-white z-[200] hidden overflow-y-auto p-6">
        <div class="max-w-xl mx-auto text-center py-6">
            <h2 class="text-3xl font-black text-blue-900 italic mb-2">Performance Analysis</h2>
            <div class="relative w-48 h-48 mx-auto my-6"><canvas id="resChart"></canvas></div>
            
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Obtained Score</p>
            <div class="text-6xl font-black text-blue-800 mb-6" id="rFinalScore">0.0</div>

            <div class="grid grid-cols-4 gap-2 mb-8">
                <div class="bg-gray-50 p-3 rounded-2xl border"><p class="text-[8px] font-black text-gray-400 uppercase">Total</p><p id="rTotal" class="font-black">0</p></div>
                <div class="bg-green-50 p-3 rounded-2xl border border-green-100"><p class="text-[8px] font-black text-green-600 uppercase">Right</p><p id="rRight" class="font-black text-green-700">0</p></div>
                <div class="bg-red-50 p-3 rounded-2xl border border-red-100"><p class="text-[8px] font-black text-red-600 uppercase">Wrong</p><p id="rWrong" class="font-black text-red-700">0</p></div>
                <div class="bg-yellow-50 p-3 rounded-2xl border border-yellow-100"><p class="text-[8px] font-black text-yellow-400 uppercase">Skip</p><p id="rSkip" class="font-black text-yellow-700">0</p></div>
            </div>

            <button onclick="generateSolveSheet()" class="w-full bg-blue-900 text-white py-5 rounded-[2rem] font-black uppercase text-xs mb-3 shadow-xl">View Detailed Solve Sheet</button>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="window.print()" class="bg-gray-100 text-gray-500 py-4 rounded-[1.5rem] font-bold uppercase text-[10px]">Download PDF</button>
                <button onclick="location.reload()" class="bg-blue-50 text-blue-700 py-4 rounded-[1.5rem] font-bold uppercase text-[10px]">Retake Exam</button>
            </div>
            
            <div id="solveArea" class="mt-12 text-left space-y-6 hidden pb-20"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://gdmhswxnlhvtyfxaevnt.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkbWhzd3hubGh2dHlmeGFldm50Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MjQyMTQsImV4cCI6MjA5MzIwMDIxNH0.0vDkuK0s6dIYWsgPmvfXXPyalpHNqkm3J--kbhck2PI';
        const atlas = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let exam = null, userAns = {}, score = 0, wrongCount = 0;
        const examId = new URLSearchParams(window.location.search).get('id');

        window.onload = async () => {
            const { data, error } = await atlas.from('exams').select('*').eq('id', examId).single();
            if(data) {
                exam = data;
                document.getElementById('vSubject').innerText = exam.subject || "No Subject";
                document.getElementById('vChap').innerText = (exam.paper || "") + " | " + (exam.chapter || "");
                document.getElementById('vDesc').innerText = exam.description || "সবগুলো প্রশ্নের সঠিক উত্তর দেওয়ার চেষ্টা করো।";
                document.getElementById('vTime').innerText = exam.duration || "0";
                document.getElementById('vCount').innerText = exam.questions ? exam.questions.length : "0";
                document.getElementById('vNeg').innerText = exam.neg_mark || "0";
            }
        };

        function startExam() {
            document.getElementById('startScreen').classList.add('hidden');
            renderQ(); setupNav(); runTimer(exam.duration);
        }

        function renderQ() {
            document.getElementById('qContainer').innerHTML = exam.questions.map((q, i) => `
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100" id="qBox-${i}">
                    <p class="font-black text-gray-800 text-[16px] mb-6 leading-relaxed">
                        <span class="text-blue-700 mr-2">${i+1}.</span> ${q.question || q.q || "Question Text Missing"}
                    </p>
                    <div class="space-y-2">
                        ${['option1', 'option2', 'option3', 'option4'].map((optKey, idx) => {
                            const optVal = q[optKey] || q[`o${idx+1}`] || "Option Missing";
                            return `<div onclick="selectOpt(${i}, '${optVal}', this)" class="opt opt-btn-${i}">${optVal}</div>`;
                        }).join('')}
                    </div>
                </div>
            `).join('');
        }

        function setupNav() {
            document.getElementById('navBox').innerHTML = exam.questions.map((_, i) => `
                <button id="nav-${i}" onclick="document.getElementById('qBox-${i}').scrollIntoView({behavior:'smooth', block:'center'})" class="nav-btn">${i+1}</button>
            `).join('');
        }

        function selectOpt(idx, ans, el) {
            userAns[idx] = ans;
            document.querySelectorAll(`.opt-btn-${idx}`).forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById(`nav-${idx}`).classList.add('answered');
        }

        function runTimer(m) {
            let t = m * 60;
            const iv = setInterval(() => {
                let ms = Math.floor(t/60), ss = t%60;
                document.getElementById('timer').innerText = `${ms<10?'0':''}${ms}:${ss<10?'0':''}${ss}`;
                if(t <= 0) { clearInterval(iv); submitExam(); }
                t--;
            }, 1000);
        }

        function submitExam() {
            score = 0; wrongCount = 0;
            const total = exam.questions.length;
            
            exam.questions.forEach((q, i) => {
                if(userAns[i]) {
                    const correct = (q.answer || q.ans || "").trim();
                    if(userAns[i].trim() === correct) score++;
                    else wrongCount++;
                }
            });

            const skipped = total - (score + wrongCount);
            const negMarkVal = parseFloat(exam.neg_mark || 0);
            const finalMark = score - (wrongCount * negMarkVal);

            document.getElementById('rFinalScore').innerText = finalMark.toFixed(2);
            document.getElementById('rTotal').innerText = total;
            document.getElementById('rRight').innerText = score;
            document.getElementById('rWrong').innerText = wrongCount;
            document.getElementById('rSkip').innerText = skipped;

            new Chart(document.getElementById('resChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Right', 'Wrong', 'Skip'],
                    datasets: [{ data: [score, wrongCount, skipped], backgroundColor: ['#22c55e', '#ef4444', '#e2e8f0'], borderWidth: 0 }]
                },
                options: { cutout: '80%', plugins: { legend: { display: false } } }
            });

            document.getElementById('resModal').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function generateSolveSheet() {
            const area = document.getElementById('solveArea');
            area.classList.remove('hidden');
            area.innerHTML = `<h3 class="font-black text-2xl text-blue-900 mb-8 border-b pb-4">Solve Sheet Details</h3>` + 
            exam.questions.map((q, i) => {
                const uAns = userAns[i] || "Skipped";
                const correct = (q.answer || q.ans || "").trim();
                const isRight = uAns.trim() === correct;
                return `
                <div class="p-8 rounded-[2.5rem] border ${isRight ? 'bg-green-50/50 border-green-100' : 'bg-red-50/50 border-red-100'}">
                    <p class="font-bold text-gray-800 mb-4">${i+1}. ${q.question || q.q}</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 text-xs font-black uppercase">
                        <div class="p-4 bg-white rounded-2xl border">Your: <span class="${isRight?'text-green-600':'text-red-600'}">${uAns}</span></div>
                        <div class="p-4 bg-white rounded-2xl border text-green-700">Correct: ${correct}</div>
                    </div>
                    <div class="mt-4 p-5 bg-white rounded-[1.5rem] border-l-4 border-blue-600 text-sm">
                        <p class="font-black text-blue-900 mb-1 text-[10px] uppercase tracking-widest">Explanation</p>
                        <p class="text-gray-600 leading-relaxed">${q.explanation || q.exp || 'ব্যাখ্যা দেওয়া হয়নি।'}</p>
                    </div>
                </div>`;
            }).join('');
            area.scrollIntoView({behavior:'smooth'});
        }
    </script>
</body>
</html>
