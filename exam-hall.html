<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS - Exam Hall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background: #f8fafc; scroll-behavior: smooth; }
        
        /* Exam Options */
        .opt-label { cursor: pointer; border: 2px solid #f1f5f9; border-radius: 1rem; padding: 14px; font-weight: 600; background: #fff; margin-bottom: 10px; transition: 0.2s; display: flex; align-items: center; }
        .opt-letter { width: 28px; height: 28px; border-radius: 50%; background: #f1f5f9; color: #64748b; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; margin-right: 12px; shrink-0; }
        .selected-opt { border-color: #1e40af; background: #eff6ff; }
        .selected-opt .opt-letter { background: #1e40af; color: white; }
        .locked { cursor: not-allowed; opacity: 0.7; }

        /* Navigation */
        .nav-box { position: fixed; right: 20px; top: 100px; width: 160px; max-height: 55vh; overflow-y: auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); z-index: 40; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; border: 1px solid #e2e8f0; }
        .nav-btn { width: 100%; aspect-ratio: 1; border-radius: 10px; font-size: 11px; font-weight: bold; background: #f1f5f9; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .nav-btn.answered { background: #1e40af; color: white; }
        
        /* Fixed Submit */
        .fixed-submit { position: fixed; bottom: 30px; right: 30px; z-index: 50; padding: 16px 35px; border-radius: 30px; font-weight: 900; background: #1e40af; color: white; text-transform: uppercase; box-shadow: 0 10px 20px rgba(30,64,175,0.3); border: none; cursor: pointer; }
        
        /* Filters */
        .filter-btn { padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; border: 1px solid #e2e8f0; background: white; color: #64748b; }
        .filter-active { background: #16a34a; color: white; border-color: #16a34a; }

        @media (max-width: 1024px) { .nav-box { display: none; } .fixed-submit { right: 5%; width: 90%; bottom: 20px; } }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="pb-32">

    <div id="examContainer" class="container mx-auto p-4 md:p-6"></div>
    
    <script>
        const SUPABASE_URL = 'https://gdmhswxnlhvtyfxaevnt.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkbWhzd3hubGh2dHlmeGFldm50Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MjQyMTQsImV4cCI6MjA5MzIwMDIxNH0.0vDkuK0s6dIYWsgPmvfXXPyalpHNqkm3J--kbhck2PI';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let examData = null, userAnswers = [], lockedAnswers = [], timer = null, timeLeft = 0;
        const urlParams = new URLSearchParams(window.location.search);
        const examId = urlParams.get('id');
        const letters = ['A', 'B', 'C', 'D', 'E'];

        async function loadExam() {
            if(!examId) return;
            const { data, error } = await supabase.from('exams').select('*').eq('exam_id', examId).single();
            if(data) {
                examData = data;
                userAnswers = new Array(examData.questions.length).fill(null);
                lockedAnswers = new Array(examData.questions.length).fill(false);
                showPreExamInfo();
            }
        }

        function showPreExamInfo() {
            document.getElementById('examContainer').innerHTML = `
                <div class="bg-white rounded-[2.5rem] shadow-xl p-8 max-w-xl mx-auto border border-gray-100 text-center">
                    <h1 class="text-3xl font-black text-blue-900 mb-2 italic uppercase">ATLAS Exam Hall</h1>
                    <p class="text-sm font-bold text-blue-600 mb-8 uppercase tracking-widest">${examData.chapter}</p>
                    <div class="grid grid-cols-3 gap-3 mb-8">
                        <div class="bg-gray-50 p-4 rounded-2xl border">
                            <p class="text-[9px] font-black text-gray-400 uppercase">Time</p>
                            <p class="font-black text-blue-800">${examData.duration || 60} M</p>
                        </div>
                        <div class="bg-gray-50 p-4 rounded-2xl border">
                            <p class="text-[9px] font-black text-gray-400 uppercase">Questions</p>
                            <p class="font-black text-blue-800">${examData.questions.length}</p>
                        </div>
                        <div class="bg-gray-50 p-4 rounded-2xl border">
                            <p class="text-[9px] font-black text-gray-400 uppercase">Negative</p>
                            <p class="font-black text-red-600">${examData.negative_value || 0.25}</p>
                        </div>
                    </div>
                    <div class="mb-8">
                        <input type="text" id="studentName" class="w-full bg-gray-50 border p-4 rounded-2xl font-bold text-center outline-none focus:border-blue-500" placeholder="Enter Your Full Name">
                    </div>
                    <button onclick="startExam()" class="w-full bg-blue-900 text-white py-5 rounded-[2rem] font-black uppercase tracking-widest shadow-xl">Start Exam Now</button>
                </div>
            `;
        }

        function startExam() {
            const name = document.getElementById('studentName').value;
            if(!name) return alert('Name is required!');
            sessionStorage.setItem(`exam_${examId}_name`, name);
            renderExam();
            startTimer();
        }

        function renderExam() {
            const container = document.getElementById('examContainer');
            container.innerHTML = `
                <nav class="bg-white/80 backdrop-blur-md p-4 shadow-sm sticky top-0 z-50 flex justify-between items-center px-6 no-print rounded-2xl mb-6">
                    <span class="font-black text-blue-900 italic uppercase">ATLAS Live</span>
                    <div id="timerDisplay" class="font-black text-red-600 bg-red-50 px-5 py-2 rounded-full border border-red-100 text-lg">00:00</div>
                </nav>
                <div id="navBox" class="nav-box no-print"></div>
                <div id="qList" class="max-w-3xl lg:ml-12 space-y-6"></div>
                <button onclick="submitExam()" class="fixed-submit no-print">Submit Exam</button>
            `;
            
            document.getElementById('navBox').innerHTML = examData.questions.map((_, i) => `<button onclick="scrollToQ(${i})" id="nav-${i}" class="nav-btn ${userAnswers[i] !== null ? 'answered' : ''}">${i+1}</button>`).join('');
            
            document.getElementById('qList').innerHTML = examData.questions.map((q, i) => {
                const options = [q.option1, q.option2, q.option3, q.option4, q.option5].filter(o => o && o.trim());
                return `
                    <div id="q-${i}" class="bg-white rounded-[2rem] shadow-sm p-6 md:p-8 border border-gray-100">
                        <p class="font-black text-gray-800 text-lg mb-6 leading-relaxed"><span class="text-blue-700 mr-2">${i+1}.</span> ${q.questions}</p>
                        <div class="space-y-2">
                            ${options.map((opt, oIdx) => `
                                <div onclick="selectAnswer(${i}, ${oIdx+1}, this)" class="opt-label opt-btn-${i} ${userAnswers[i] === (oIdx+1) ? 'selected-opt' : ''} ${lockedAnswers[i] ? 'locked' : ''}">
                                    <div class="opt-letter">${letters[oIdx]}</div>
                                    <span>${opt}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.selectAnswer = (qIdx, ansIdx, el) => {
            if(lockedAnswers[qIdx]) return;
            userAnswers[qIdx] = ansIdx;
            lockedAnswers[qIdx] = true; // Lock immediately
            el.classList.add('selected-opt');
            document.getElementById(`nav-${qIdx}`).classList.add('answered');
            document.querySelectorAll(`.opt-btn-${qIdx}`).forEach(b => b.classList.add('locked'));
        };

        window.scrollToQ = (i) => document.getElementById(`q-${i}`).scrollIntoView({ behavior: 'smooth', block: 'center' });

        function startTimer() {
            timeLeft = (examData.duration || 60) * 60;
            timer = setInterval(() => {
                if(timeLeft <= 0) { clearInterval(timer); submitExam(); }
                let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
                document.getElementById('timerDisplay').innerText = `${m < 10 ? '0':''}${m}:${s < 10 ? '0':''}${s}`;
                timeLeft--;
            }, 1000);
        }

        async function submitExam() {
            if(timer) clearInterval(timer);
            const questions = examData.questions;
            let correct = 0, wrong = 0, skipped = 0;
            const detailed = [];
            
            questions.forEach((q, i) => {
                const uAns = userAnswers[i], cAns = parseInt(q.answer);
                if(uAns === null) skipped++;
                else if(uAns === cAns) correct++;
                else wrong++;
                detailed.push({ correct: uAns === cAns, skipped: uAns === null, user: uAns, actual: cAns });
            });

            const negVal = examData.negative_marking ? (wrong * examData.negative_value) : 0;
            const finalScore = Math.max(0, correct - negVal);

            const result = {
                student_name: sessionStorage.getItem(`exam_${examId}_name`),
                exam_id: examId,
                correct, wrong, skipped,
                final_score: finalScore.toFixed(2),
                neg_applied: negVal.toFixed(2),
                questions: examData.questions,
                detailed_results: detailed,
                timestamp: new Date()
            };
            
            await supabase.from('results').insert([result]);
            showResult(result);
        }

        function showResult(r) {
            document.getElementById('examContainer').innerHTML = `
                <div class="max-w-3xl mx-auto py-10">
                    <div class="flex justify-between items-center mb-6 no-print">
                        <button onclick="location.reload()" class="bg-white border px-4 py-2 rounded-xl text-sm font-bold">❮ Retake</button>
                        <button onclick="window.print()" class="bg-blue-900 text-white px-5 py-2 rounded-xl font-bold text-sm shadow-lg">Download PDF</button>
                    </div>

                    <div class="bg-white rounded-[2.5rem] shadow-sm p-8 border mb-8">
                        <h3 class="font-black text-gray-800 mb-6 flex items-center">📊 Score Breakdown</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
                            <div class="w-48 h-48 mx-auto"><canvas id="resChart"></canvas></div>
                            <div class="space-y-3">
                                <div class="bg-green-50 p-4 rounded-2xl flex justify-between border border-green-100">
                                    <span class="text-[10px] font-black text-green-700 uppercase">Correct Score</span>
                                    <span class="font-black text-green-600">+${r.correct}.0</span>
                                </div>
                                <div class="bg-red-50 p-4 rounded-2xl flex justify-between border border-red-100">
                                    <span class="text-[10px] font-black text-red-700 uppercase">Negative Mark</span>
                                    <span class="font-black text-red-600">-${r.neg_applied}</span>
                                </div>
                                <div class="bg-blue-900 p-5 rounded-2xl flex justify-between items-center">
                                    <span class="text-xs font-black text-blue-100 uppercase">Final Score</span>
                                    <span class="text-3xl font-black text-white">${r.final_score}</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="flex gap-2 mb-6 no-print overflow-x-auto pb-2">
                        <button onclick="filter('all')" id="f-all" class="filter-btn filter-active">All (${r.questions.length})</button>
                        <button onclick="filter('correct')" id="f-correct" class="filter-btn">Correct (${r.correct})</button>
                        <button onclick="filter('wrong')" id="f-wrong" class="filter-btn">Incorrect (${r.wrong})</button>
                        <button onclick="filter('skipped')" id="f-skipped" class="filter-btn">Skipped (${r.skipped})</button>
                    </div>
                    
                    <div id="solveSheet" class="space-y-4"></div>
                </div>
            `;
            
            new Chart(document.getElementById('resChart'), {
                type: 'doughnut',
                data: { datasets: [{ data: [r.correct, r.wrong, r.skipped], backgroundColor: ['#22c55e', '#ef4444', '#e2e8f0'] }] },
                options: { cutout: '80%', plugins: { legend: { display: false } } }
            });

            window.currentR = r;
            filter('all');
        }

        window.filter = (f) => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('filter-active'));
            document.getElementById(`f-${f}`).classList.add('filter-active');
            
            const r = window.currentR;
            let list = r.detailed_results.map((res, i) => ({...res, q: r.questions[i], idx: i}));
            if(f === 'correct') list = list.filter(x => x.correct);
            else if(f === 'wrong') list = list.filter(x => !x.correct && !x.skipped);
            else if(f === 'skipped') list = list.filter(x => x.skipped);

            document.getElementById('solveSheet').innerHTML = list.map(item => {
                const q = item.q;
                const opts = [q.option1, q.option2, q.option3, q.option4, q.option5].filter(o => o && o.trim());
                const correctText = opts[item.actual-1];
                const userText = item.skipped ? 'Skipped' : opts[item.user-1];
                
                let badge = `<div class="w-8 h-8 rounded-full bg-gray-100 text-gray-500 flex items-center justify-center font-black text-sm">${item.idx+1}</div>`;
                if(item.correct) badge = `<div class="w-8 h-8 rounded-full bg-green-100 text-green-600 flex items-center justify-center font-black text-sm">${item.idx+1}</div>`;
                else if(!item.skipped) badge = `<div class="w-8 h-8 rounded-full bg-red-100 text-red-600 flex items-center justify-center font-black text-sm">${item.idx+1}</div>`;

                return `
                    <div class="bg-white p-6 rounded-[2rem] border border-gray-100 shadow-sm">
                        <div class="flex items-start gap-4 mb-6">
                            ${badge} <p class="font-bold text-gray-800 pt-1">${q.questions}</p>
                        </div>
                        <div class="pl-12 space-y-3">
                            ${opts.map((o, oi) => {
                                let icon = `<div class="opt-letter border">${letters[oi]}</div>`;
                                if(oi+1 === item.actual) icon = `<div class="w-7 h-7 rounded-full bg-green-500 text-white flex items-center justify-center font-bold mr-3 shrink-0">✓</div>`;
                                else if(oi+1 === item.user && !item.correct) icon = `<div class="w-7 h-7 rounded-full bg-red-500 text-white flex items-center justify-center font-bold mr-3 shrink-0">✕</div>`;
                                return `<div class="flex items-center text-sm font-semibold text-gray-700">${icon}<span>${o}</span></div>`;
                            }).join('')}
                        </div>
                        ${q.explanation ? `<div class="pl-12 mt-6"><div class="bg-blue-50 p-4 rounded-2xl border-l-4 border-blue-500 text-xs text-gray-600"><span class="font-black text-blue-900 uppercase block mb-1">Explanation</span>${q.explanation}</div></div>` : ''}
                    </div>
                `;
            }).join('');
        };

        loadExam();
    </script>
</body>
</html>
