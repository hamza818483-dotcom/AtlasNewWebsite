<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS | Premium Exam Hall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background: #f8fafc; scroll-behavior: smooth; }
        .opt-btn { cursor: pointer; border: 2px solid #f1f5f9; border-radius: 1.25rem; padding: 16px; font-weight: 600; background: #fff; margin-bottom: 12px; display: flex; align-items: center; transition: 0.2s; }
        .opt-letter { width: 32px; height: 32px; border-radius: 50%; background: #f1f5f9; color: #64748b; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; margin-right: 14px; flex-shrink: 0; }
        .selected { border-color: #1e40af; background: #eff6ff; }
        .selected .opt-letter { background: #1e40af; color: white; }
        .locked { cursor: not-allowed; opacity: 0.6; pointer-events: none; }
        .nav-box { position: fixed; right: 20px; top: 110px; width: 160px; max-height: 55vh; overflow-y: auto; background: white; padding: 15px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; border: 1px solid #e2e8f0; z-index: 40; }
        .nav-dot { aspect-ratio: 1; border-radius: 10px; font-size: 11px; font-weight: bold; background: #f1f5f9; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; border: 1px solid #f1f5f9; }
        .nav-dot.done { background: #1e40af; color: white; border-color: #1e40af; }
        .fixed-sub { position: fixed; bottom: 30px; right: 30px; z-index: 50; padding: 18px 40px; border-radius: 35px; font-weight: 900; background: #1e40af; color: white; text-transform: uppercase; box-shadow: 0 10px 25px rgba(30,64,175,0.3); border: none; cursor: pointer; }
        .filter-btn { padding: 10px 20px; border-radius: 25px; font-size: 13px; font-weight: bold; border: 1px solid #e2e8f0; background: white; color: #64748b; transition: 0.2s; }
        .f-active { background: #16a34a; color: white; border-color: #16a34a; }
        @media (max-width: 1024px) { .nav-box { display: none; } .fixed-sub { right: 5%; width: 90%; } }
        @media print { .no-print { display: none !important; } body { background: white; } .print-area { width: 100% !important; margin: 0 !important; } }
    </style>
</head>
<body class="pb-32">
    <div class="container mx-auto p-4 md:p-6 print-area">
        
        <div id="startScreen" class="hidden fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center p-6 text-center no-print">
            <h1 class="text-3xl font-black text-blue-900 mb-1 italic uppercase tracking-tighter">ATLAS ADMISSION CARE</h1>
            <p id="sChap" class="text-sm font-bold text-blue-600 mb-8 uppercase tracking-widest"></p>
            <div class="bg-gray-50 p-8 rounded-[2.5rem] border mb-8 w-full max-w-sm">
                <div class="grid grid-cols-3 gap-4 mb-6">
                    <div><p class="text-[9px] text-gray-400 font-black uppercase">Time</p><p id="sTime" class="font-black text-blue-800 text-lg">0 M</p></div>
                    <div><p class="text-[9px] text-gray-400 font-black uppercase">s</p><p id="sQs" class="font-black text-blue-800 text-lg">0</p></div>
                    <div><p class="text-[9px] text-gray-400 font-black uppercase">Neg</p><p id="sNeg" class="font-black text-red-600 text-lg">0.0</p></div>
                </div>
                <input type="text" id="stuName" class="w-full bg-white border p-4 rounded-2xl font-bold text-center outline-none focus:border-blue-500" placeholder="আপনার নাম লিখুন">
            </div>
            <button onclick="startExam()" class="w-full max-w-sm bg-blue-900 text-white py-5 rounded-[2rem] font-black uppercase tracking-widest shadow-xl">Start Exam Now</button>
        </div>

        <div id="liveArea" class="hidden no-print">
            <nav class="bg-white/90 backdrop-blur-md p-4 shadow-sm sticky top-0 z-50 flex justify-between items-center px-6 rounded-3xl mb-8 border border-gray-100">
                <span class="font-black text-blue-900 italic uppercase">ATLAS LIVE</span>
                <div id="timer" class="font-black text-red-600 bg-red-50 px-6 py-2 rounded-full border border-red-100 text-xl tracking-tighter">00:00</div>
            </nav>
            <div id="nav" class="nav-box"></div>
            <main id="qs" class="max-w-3xl lg:ml-12 space-y-8"></main>
            <button onclick="submitExam()" class="fixed-sub">Submit Exam</button>
        </div>

        <div id="resArea" class="hidden max-w-4xl mx-auto py-6">
            <div class="flex justify-between items-center mb-8 no-print">
                <button onclick="location.reload()" class="bg-white border px-5 py-2.5 rounded-2xl text-sm font-bold text-gray-600 shadow-sm">❮ Retake Exam</button>
                <button onclick="window.print()" class="bg-blue-900 text-white px-6 py-2.5 rounded-2xl font-black text-xs shadow-lg uppercase tracking-widest">Download PDF</button>
            </div>

            <div class="bg-white p-8 md:p-10 rounded-[3rem] shadow-sm border border-gray-100 mb-10">
                <h3 class="font-black text-gray-800 mb-8 flex items-center text-xl tracking-tight">📊 Performance Analysis</h3>
                <div class="flex flex-col md:flex-row items-center gap-12">
                    <div class="w-48 h-48 shrink-0"><canvas id="chart"></canvas></div>
                    <div class="flex-1 w-full grid grid-cols-2 gap-5">
                        <div class="bg-green-50 p-5 rounded-3xl border border-green-100 text-center shadow-sm">
                            <p class="text-[10px] font-black text-green-700 uppercase tracking-widest mb-1">Correct</p>
                            <p id="rC" class="text-3xl font-black text-green-600">+0.0</p>
                        </div>
                        <div class="bg-red-50 p-5 rounded-3xl border border-red-100 text-center shadow-sm">
                            <p class="text-[10px] font-black text-red-700 uppercase tracking-widest mb-1">Negative</p>
                            <p id="rN" class="text-3xl font-black text-red-600">-0.0</p>
                        </div>
                        <div class="col-span-2 bg-blue-900 p-6 rounded-[2rem] flex justify-between items-center text-white shadow-2xl">
                            <span class="font-black text-sm uppercase tracking-widest text-blue-100">Final Score</span>
                            <span id="rF" class="text-5xl font-black">0.00</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex gap-3 mb-8 no-print overflow-x-auto pb-4 scrollbar-hide">
                <button onclick="filterQs('all')" id="f-all" class="filter-btn f-active">All</button>
                <button onclick="filterQs('correct')" id="f-correct" class="filter-btn">Correct</button>
                <button onclick="filterQs('wrong')" id="f-wrong" class="filter-btn">Incorrect</button>
                <button onclick="filterQs('skipped')" id="f-skipped" class="filter-btn">Skipped</button>
            </div>
            <div id="solve" class="space-y-6"></div>
        </div>
    </div>

    <script>
        const atlas = window.supabase.createClient('https://gdmhswxnlhvtyfxaevnt.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkbWhzd3hubGh2dHlmeGFldm50Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MjQyMTQsImV4cCI6MjA5MzIwMDIxNH0.0vDkuK0s6dIYWsgPmvfXXPyalpHNqkm3J--kbhck2PI');
        let examData, userAns = {}, locked = {}, timerIv;
        const examId = new URLSearchParams(window.location.search).get('id');
        const L = ['A', 'B', 'C', 'D', 'E'];

        window.onload = async () => {
            if(!examId) return alert("লিংক সঠিক নয়!");
            const { data } = await atlas.from('exams').select('*').eq('exam_id', examId).single();
            if(data) {
                examData = data;
                examData.s = typeof data.s === 'string' ? JSON.parse(data.s) : (data.s || []);
                document.getElementById('sChap').innerText = (examData.subject || "") + " | " + (examData.chapter || "");
                document.getElementById('sTime').innerText = (examData.duration || 20) + " M";
                document.getElementById('sQs').innerText = examData.s.length;
                document.getElementById('sNeg').innerText = examData.negative_marking ? examData.negative_value : "0.0";
                document.getElementById('startScreen').classList.remove('hidden');
            }
        };

        function startExam() {
            if(!document.getElementById('stuName').value) return alert("নাম লিখুন!");
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('liveArea').classList.remove('hidden');
            renders();
            let timeLeft = (examData.duration || 20) * 60;
            timerIv = setInterval(() => {
                if(timeLeft <= 0) { clearInterval(timerIv); submitExam(); }
                let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
                document.getElementById('timer').innerText = `${m < 10 ? '0':''}${m}:${s < 10 ? '0':''}${s}`;
                timeLeft--;
            }, 1000);
        }

        function renders() {
            document.getElementById('nav').innerHTML = examData.s.map((_, i) => `<div id="nav-${i}" onclick="document.getElementById('q-${i}').scrollIntoView({behavior:'smooth'})" class="nav-dot">${i+1}</div>`).join('');
            document.getElementById('qs').innerHTML = examData.s.map((q, i) => {
                const opts = [q.option1, q.option2, q.option3, q.option4, q.option5].filter(o => o && o.trim());
                return `<div id="q-${i}" class="bg-white p-8 rounded-[2.5rem] border shadow-sm"><p class="font-bold text-gray-800 text-lg mb-8 leading-relaxed"><span class="text-blue-700 mr-2 font-black">${i+1}.</span> ${q.s || q.}</p><div class="space-y-3">${opts.map((o, oi) => `<div onclick="selectOpt(${i}, ${oi+1}, this)" class="opt-btn ob-${i}"><div class="opt-letter">${L[oi]}</div><span class="font-semibold">${o}</span></div>`).join('')}</div></div>`;
            }).join('');
        }

        function selectOpt(qi, ai, el) {
            if(locked[qi]) return;
            userAns[qi] = ai; locked[qi] = true;
            el.classList.add('selected'); document.getElementById(`nav-${qi}`).classList.add('done');
            document.querySelectorAll(`.ob-${qi}`).forEach(b => b.classList.add('locked'));
        }

        function submitExam() {
            clearInterval(timerIv);
            let c = 0, w = 0, s = 0;
            examData.s.forEach((q, i) => {
                if(!userAns[i]) s++;
                else if(parseInt(userAns[i]) === parseInt(q.answer)) c++;
                else w++;
            });
            const nv = parseFloat(examData.negative_value) || 0;
            const nm = examData.negative_marking ? (w * nv).toFixed(2) : "0.00";
            document.getElementById('rC').innerText = `+${c}.0`;
            document.getElementById('rN').innerText = `-${nm}`;
            document.getElementById('rF').innerText = (c - nm).toFixed(2);
            new Chart(document.getElementById('chart'), { type: 'doughnut', data: { datasets: [{ data: [c, w, s], backgroundColor: ['#22c55e', '#ef4444', '#e2e8f0'] }] }, options: { cutout: '80%', plugins: { legend: { display: false } } } });
            document.getElementById('liveArea').classList.add('hidden');
            document.getElementById('resArea').classList.remove('hidden');
            window.scrollTo(0,0); filterQs('all');
        }

        function filterQs(f) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('f-active'));
            document.getElementById(`f-${f}`).classList.add('f-active');
            let html = '';
            examData.s.forEach((q, i) => {
                const u = userAns[i], c = parseInt(q.answer), st = !u ? 'skipped' : (u === c ? 'correct' : 'wrong');
                if(f !== 'all' && st !== f) return;
                const opts = [q.option1, q.option2, q.option3, q.option4, q.option5].filter(o => o && o.trim());
                let bCls = st === 'correct' ? 'bg-green-100 text-green-600' : (st === 'wrong' ? 'bg-red-100 text-red-600' : 'bg-gray-100 text-gray-500');
                html += `<div class="bg-white p-8 rounded-[2.5rem] border shadow-sm mb-6"><div class="flex items-start gap-4 mb-6"><div class="w-10 h-10 rounded-full flex items-center justify-center font-black text-sm shrink-0 ${bCls}">${i+1}</div><p class="font-bold text-gray-800 pt-1">${q.s || q.}</p></div><div class="pl-14 space-y-3">${opts.map((o, oi) => { let icon = `<div class="opt-letter border">${L[oi]}</div>`; if(oi+1 === c) icon = `✓`; else if(oi+1 === u && st === 'wrong') icon = `✕`; return `<div class="flex items-center text-sm font-semibold">${icon}<span>${o}</span></div>`; }).join('')}</div>${q.explanation ? `<div class="pl-14 mt-6"><div class="bg-blue-50/50 p-5 rounded-3xl border-l-4 border-blue-500 text-xs"><span class="font-black text-blue-900 block mb-2 uppercase text-[9px]">Explanation</span>${q.explanation}</div></div>` : ''}</div>`;
            });
            document.getElementById('solve').innerHTML = html;
        }
    </script>
</body>
</html>
