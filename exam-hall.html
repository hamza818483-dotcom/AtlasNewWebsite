<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-6">
        <h1 class="text-3xl font-bold mb-6 text-center">📋 ATLAS Smart Exam System - Admin Panel</h1>
        
        <div class="bg-white rounded-lg shadow-lg p-6 mb-8">
            <h2 class="text-2xl font-bold mb-4">➕ Add New Exam</h2>
            
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block font-semibold mb-2">Subject <span class="text-red-500">*</span></label>
                    <input type="text" id="subject" class="w-full border p-2 rounded subject-suggest" placeholder="e.g., Biology">
                </div>
                <div>
                    <label class="block font-semibold mb-2">Paper <span class="text-red-500">*</span></label>
                    <input type="text" id="paper" class="w-full border p-2 rounded paper-suggest" placeholder="e.g., 1st Paper">
                </div>
                <div>
                    <label class="block font-semibold mb-2">Chapter <span class="text-red-500">*</span></label>
                    <input type="text" id="chapter" class="w-full border p-2 rounded chapter-suggest" placeholder="e.g., কোষ ও এর গঠন">
                </div>
                <div>
                    <label class="block font-semibold mb-2">Exam Title</label>
                    <input type="text" id="title" class="w-full border p-2 rounded" placeholder="Custom exam title">
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div><label class="block font-semibold mb-2">Start Date & Time</label><input type="datetime-local" id="startTime" class="w-full border p-2 rounded"></div>
                <div><label class="block font-semibold mb-2">End Date & Time</label><input type="datetime-local" id="endTime" class="w-full border p-2 rounded"></div>
                <div><label class="block font-semibold mb-2">Duration (minutes)</label><input type="number" id="duration" class="w-full border p-2 rounded" value="20"></div>
            </div>
            
            <div class="mb-4">
                <label class="block font-semibold mb-2">Negative Marking</label>
                <div class="flex gap-4 items-center">
                    <label><input type="radio" name="negativeMarking" value="on" class="mr-1"> ON</label>
                    <label><input type="radio" name="negativeMarking" value="off" checked class="mr-1"> OFF</label>
                    <input type="number" id="negativeValue" class="border p-2 rounded w-24" value="0.25" step="0.25">
                </div>
            </div>
            
            <div class="mb-4">
                <label class="block font-semibold mb-2">Input Method</label>
                <div class="flex gap-4 mb-3">
                    <button onclick="showCSVUpload()" class="bg-blue-500 text-white px-4 py-2 rounded">📁 CSV Upload</button>
                    <button onclick="showExternalLink()" class="bg-green-500 text-white px-4 py-2 rounded">🔗 External Link</button>
                </div>
                
                <div id="csvUploadDiv" style="display:none;">
                    <input type="file" id="csvFile" accept=".csv" class="border p-2 rounded w-full mb-2">
                    <button onclick="uploadCSV()" class="bg-purple-500 text-white px-4 py-2 rounded">Process CSV</button>
                </div>
                <div id="externalLinkDiv" style="display:none;"><input type="url" id="externalUrl" class="w-full border p-2 rounded" placeholder="https://..."></div>
            </div>
            
            <div id="questionsContainer" class="mb-4" style="display:none;">
                <div id="questionsPreview" class="max-h-60 overflow-y-auto border p-4 rounded bg-gray-50 mb-4"></div>
                <button onclick="saveExamToDB()" id="saveBtn" class="bg-red-500 text-white px-6 py-2 rounded w-full font-bold">💾 Save Exam to Database</button>
            </div>
        </div>
        
        <div class="bg-white rounded-lg shadow-lg p-6"><h2 class="text-2xl font-bold mb-4">📋 Manage Exams</h2><div id="examsList"></div></div>
    </div>
    
    <script>
        const SUPABASE_URL = 'https://gdmhswxnlhvtyfxaevnt.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkbWhzd3hubGh2dHlmeGFldm50Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MjQyMTQsImV4cCI6MjA5MzIwMDIxNH0.0vDkuK0s6dIYWsgPmvfXXPyalpHNqkm3J--kbhck2PI';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentQuestions = [];

        $(document).ready(() => loadExistingData());

        async function loadExistingData() {
            const { data } = await supabaseClient.from('exams').select('subject, paper, chapter');
            if(data) {
                const getUnique = (key) => [...new Set(data.map(e => e[key]).filter(Boolean))];
                $('.subject-suggest').select2({ tags: true, data: getUnique('subject').map(v => ({id:v, text:v})) });
                $('.paper-suggest').select2({ tags: true, data: getUnique('paper').map(v => ({id:v, text:v})) });
                $('.chapter-suggest').select2({ tags: true, data: getUnique('chapter').map(v => ({id:v, text:v})) });
            }
            loadExamsList();
        }

        function showCSVUpload() { document.getElementById('csvUploadDiv').style.display='block'; document.getElementById('externalLinkDiv').style.display='none'; }
        function showExternalLink() { document.getElementById('csvUploadDiv').style.display='none'; document.getElementById('externalLinkDiv').style.display='block'; }

        function uploadCSV() {
            const file = document.getElementById('csvFile').files[0];
            if(!file) return alert('Select CSV');
            const reader = new FileReader();
            reader.onload = (e) => {
                const workbook = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header:1});
                currentQuestions = rows.slice(1).map(r => ({
                    questions: r[0], option1: r[1], option2: r[2], option3: r[3], option4: r[4], 
                    option5: r[5] || "", answer: r[6], explanation: r[7], type: '1', section: '1'
                }));
                document.getElementById('questionsPreview').innerHTML = `Questions loaded: ${currentQuestions.length}`;
                document.getElementById('questionsContainer').style.display = 'block';
            };
            reader.readAsArrayBuffer(file);
        }

        async function saveExamToDB() {
            const examId = Date.now().toString();
            const examLink = window.location.origin + "/exam-hall.html?id=" + examId;
            const { error } = await supabaseClient.from('exams').insert([{
                exam_id: examId,
                subject: $('#subject').val(), paper: $('#paper').val(), chapter: $('#chapter').val(),
                title: $('#title').val() || "Exam", questions: currentQuestions,
                start_time: $('#startTime').val(), end_time: $('#endTime').val(),
                duration: $('#duration').val(), exam_link: examLink,
                negative_marking: $('input[name="negativeMarking"]:checked').val() === 'on',
                negative_value: parseFloat($('#negativeValue').val())
            }]);

            if(!error) {
                navigator.clipboard.writeText(examLink);
                alert("✅ Upload Successfully! Link Copied.");
                location.reload();
            } else { alert(error.message); }
        }

        async function loadExamsList() {
            const { data } = await supabaseClient.from('exams').select('*').order('created_at', {ascending:false});
            document.getElementById('examsList').innerHTML = `<table class="w-full border">
                <thead class="bg-gray-100"><tr><th class="p-2 border">Title</th><th class="p-2 border">Link</th><th class="p-2 border">Action</th></tr></thead>
                <tbody>${data.map(ex => `<tr><td class="p-2 border">${ex.title}</td><td class="p-2 border"><button onclick="copyL('${ex.exam_link}')" class="text-blue-500">Copy</button></td><td class="p-2 border"><button onclick="deleteEx('${ex.exam_id}')" class="text-red-500">Delete</button></td></tr>`).join('')}</tbody>
            </table>`;
        }
        function copyL(l) { navigator.clipboard.writeText(l); alert('Copied!'); }
        async function deleteEx(id) { if(confirm('Delete?')) { await supabaseClient.from('exams').delete().eq('exam_id', id); loadExamsList(); } }
    </script>
</body>
</html>
