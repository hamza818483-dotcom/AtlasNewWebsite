<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS - Exam Hall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-gray-100">
    <div id="examContainer" class="container mx-auto p-6"></div>
    
    <script>
        const SUPABASE_URL = 'https://gdmhswxnlhvtyfxaevnt.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkbWhzd3hubGh2dHlmeGFldm50Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MjQyMTQsImV4cCI6MjA5MzIwMDIxNH0.0vDkuK0s6dIYWsgPmvfXXPyalpHNqkm3J--kbhck2PI';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let examData = null;
        let userAnswers = [];
        let lockedAnswers = [];
        let timer = null;
        let timeLeft = 0;
        
        const urlParams = new URLSearchParams(window.location.search);
        const examId = urlParams.get('id');
        
        async function loadExam() {
            if(!examId) {
                document.getElementById('examContainer').innerHTML = '<div class="text-center text-red-500 text-2xl mt-20">❌ No Exam ID provided</div>';
                return;
            }
            
            const { data, error } = await supabase.from('exams').select('*').eq('exam_id', examId).single();
            if(error || !data) {
                document.getElementById('examContainer').innerHTML = '<div class="text-center text-red-500 text-2xl mt-20">❌ Exam not found</div>';
                return;
            }
            
            // Check if exam has ended
            if(data.end_time && new Date(data.end_time) < new Date()) {
                document.getElementById('examContainer').innerHTML = '<div class="text-center text-red-500 text-2xl mt-20">⏰ This exam has expired!</div>';
                return;
            }
            
            examData = data;
            userAnswers = new Array(examData.questions.length).fill(null);
            lockedAnswers = new Array(examData.questions.length).fill(false);
            
            showPreExamInfo();
        }
        
        function showPreExamInfo() {
            const container = document.getElementById('examContainer');
            container.innerHTML = `
                <div class="bg-white rounded-lg shadow-lg p-8 max-w-2xl mx-auto">
                    <h1 class="text-3xl font-bold mb-4">${examData.title || examData.subject + ' Exam'}</h1>
                    <div class="space-y-3 mb-6">
                        <p><strong>📚 Subject:</strong> ${examData.subject}</p>
                        <p><strong>📖 Paper:</strong> ${examData.paper}</p>
                        <p><strong>📑 Chapter:</strong> ${examData.chapter}</p>
                        <p><strong>❓ Total Questions:</strong> ${examData.questions.length}</p>
                        <p><strong>⏱️ Time Limit:</strong> ${examData.duration || 60} minutes</p>
                        ${examData.end_time ? `<p><strong>📅 Valid Until:</strong> ${new Date(examData.end_time).toLocaleString()}</p>` : ''}
                        ${examData.negative_marking ? `<p class="text-red-600"><strong>⚠️ Negative Marking:</strong> ${examData.negative_value} marks per wrong answer</p>` : '<p>✅ No negative marking</p>'}
                    </div>
                    <div class="mb-6">
                        <label class="block font-semibold mb-2">Enter Your Name:</label>
                        <input type="text" id="studentName" class="w-full border p-2 rounded" placeholder="Your full name">
                    </div>
                    <button onclick="startExam()" class="bg-green-600 text-white px-6 py-3 rounded-lg w-full font-bold">🚀 Start Exam</button>
                </div>
            `;
        }
        
        function startExam() {
            const studentName = document.getElementById('studentName').value;
            if(!studentName) return alert('Please enter your name');
            
            // Store in session
            sessionStorage.setItem(`exam_${examId}_answers`, JSON.stringify(userAnswers));
            sessionStorage.setItem(`exam_${examId}_locked`, JSON.stringify(lockedAnswers));
            sessionStorage.setItem(`exam_${examId}_name`, studentName);
            
            renderExam();
            startTimer();
        }
        
        function renderExam() {
            const container = document.getElementById('examContainer');
            const questions = examData.questions;
            
            let navHtml = '<div class="fixed right-4 top-20 bg-white shadow-lg rounded-lg p-4 w-64 max-h-96 overflow-y-auto z-10"><h3 class="font-bold mb-2">📌 Navigation</h3><div class="grid grid-cols-5 gap-2">';
            for(let i=0; i<questions.length; i++) {
                navHtml += `<button onclick="scrollToQuestion(${i})" class="w-8 h-8 rounded text-sm ${userAnswers[i] !== null ? 'bg-green-500 text-white' : 'bg-gray-300'} hover:bg-blue-500">${i+1}</button>`;
            }
            navHtml += '</div></div>';
            
            let questionsHtml = '<div class="mr-80">';
            questions.forEach((q, idx) => {
                const options = [q.option1, q.option2, q.option3, q.option4, q.option5].filter(opt => opt && opt.trim());
                questionsHtml += `
                    <div id="q-${idx}" class="bg-white rounded-lg shadow-md p-6 mb-4">
                        <div class="font-bold mb-3">${idx+1}. ${q.questions}</div>
                        <div class="space-y-2">
                            ${options.map((opt, optIdx) => `
                                <label class="flex items-center gap-2 ${lockedAnswers[idx] ? 'opacity-60' : ''}">
                                    <input type="radio" name="q${idx}" value="${optIdx+1}" ${userAnswers[idx] === (optIdx+1) ? 'checked' : ''} ${lockedAnswers[idx] ? 'disabled' : ''} onchange="selectAnswer(${idx}, ${optIdx+1})">
                                    <span>${String.fromCharCode(65+optIdx)}. ${opt}</span>
                                </label>
                            `).join('')}
                        </div>
                        ${lockedAnswers[idx] ? '<div class="text-orange-500 text-sm mt-2">🔒 Locked (cannot change)</div>' : ''}
                    </div>
                `;
            });
            questionsHtml += `
                <div class="fixed bottom-4 right-4">
                    <button onclick="submitExam()" class="bg-red-600 text-white px-8 py-3 rounded-lg font-bold shadow-lg">📝 Submit Exam</button>
                </div>
                </div>`;
            
            container.innerHTML = navHtml + questionsHtml;
        }
        
        window.selectAnswer = (qIndex, answer) => {
            if(lockedAnswers[qIndex]) return alert('This answer is locked! Cannot change.');
            userAnswers[qIndex] = answer;
            lockedAnswers[qIndex] = true; // Lock immediately
            sessionStorage.setItem(`exam_${examId}_answers`, JSON.stringify(userAnswers));
            sessionStorage.setItem(`exam_${examId}_locked`, JSON.stringify(lockedAnswers));
            renderExam(); // Re-render to update
        };
        
        window.scrollToQuestion = (index) => {
            document.getElementById(`q-${index}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
        };
        
        function startTimer() {
            timeLeft = (examData.duration || 60) * 60;
            const timerDisplay = document.createElement('div');
            timerDisplay.className = 'fixed top-4 right-4 bg-blue-600 text-white px-4 py-2 rounded-lg font-bold z-20';
            document.body.appendChild(timerDisplay);
            
            timer = setInterval(() => {
                if(timeLeft <= 0) {
                    clearInterval(timer);
                    submitExam();
                }
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerDisplay.innerHTML = `⏱️ ${minutes}:${seconds.toString().padStart(2,'0')}`;
                timeLeft--;
            }, 1000);
        }
        
        async function submitExam() {
            if(timer) clearInterval(timer);
            
            const studentName = sessionStorage.getItem(`exam_${examId}_name`);
            const questions = examData.questions;
            let correct = 0, wrong = 0, skipped = 0;
            const detailedResults = [];
            
            for(let i=0; i<questions.length; i++) {
                const userAns = userAnswers[i];
                const correctAns = parseInt(questions[i].answer);
                const isCorrect = (userAns === correctAns);
                
                if(userAns === null) {
                    skipped++;
                    detailedResults.push({ correct: false, skipped: true, userAnswer: null, correctAnswer: correctAns });
                } else if(isCorrect) {
                    correct++;
                    detailedResults.push({ correct: true, skipped: false, userAnswer: userAns, correctAnswer: correctAns });
                } else {
                    wrong++;
                    detailedResults.push({ correct: false, skipped: false, userAnswer: userAns, correctAnswer: correctAns });
                }
            }
            
            let totalMarks = correct;
            if(examData.negative_marking) {
                totalMarks = correct - (wrong * examData.negative_value);
                totalMarks = Math.max(0, totalMarks);
            }
            
            const result = {
                student_name: studentName,
                exam_id: examData.exam_id,
                exam_title: examData.title || examData.subject,
                total: questions.length,
                correct: correct,
                wrong: wrong,
                skipped: skipped,
                total_marks: totalMarks.toFixed(2),
                negative_applied: examData.negative_marking,
                negative_value: examData.negative_value,
                detailed_results: detailedResults,
                questions: examData.questions,
                user_answers: userAnswers,
                timestamp: new Date()
            };
            
            await supabase.from('results').insert([result]);
            showResult(result);
        }
        
        function showResult(result) {
            const container = document.getElementById('examContainer');
            const percentage = (result.correct / result.total * 100).toFixed(1);
            
            container.innerHTML = `
                <div class="bg-white rounded-lg shadow-lg p-6 max-w-6xl mx-auto">
                    <h1 class="text-3xl font-bold mb-4 text-center">📊 Exam Result</h1>
                    <div class="text-center mb-6">
                        <p class="text-xl"><strong>${result.student_name}</strong> - ${result.exam_title}</p>
                        <p class="text-gray-600">${new Date().toLocaleString()}</p>
                    </div>
                    
                    <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
                        <div class="bg-blue-100 p-4 rounded text-center"><div class="text-2xl font-bold">${result.total}</div><div>Total</div></div>
                        <div class="bg-green-100 p-4 rounded text-center"><div class="text-2xl font-bold">${result.correct}</div><div>Correct</div></div>
                        <div class="bg-red-100 p-4 rounded text-center"><div class="text-2xl font-bold">${result.wrong}</div><div>Wrong</div></div>
                        <div class="bg-gray-100 p-4 rounded text-center"><div class="text-2xl font-bold">${result.skipped}</div><div>Skipped</div></div>
                        <div class="bg-purple-100 p-4 rounded text-center"><div class="text-2xl font-bold">${result.total_marks}</div><div>Final Score</div></div>
                    </div>
                    
                    <div class="mb-8">
                        <canvas id="performanceChart" width="400" height="400" style="max-width: 400px; margin: 0 auto;"></canvas>
                    </div>
                    
                    <div class="mb-4 flex gap-2 flex-wrap">
                        <button onclick="filterQuestions('all')" class="bg-gray-500 text-white px-3 py-1 rounded">All</button>
                        <button onclick="filterQuestions('correct')" class="bg-green-500 text-white px-3 py-1 rounded">Correct</button>
                        <button onclick="filterQuestions('incorrect')" class="bg-red-500 text-white px-3 py-1 rounded">Incorrect</button>
                        <button onclick="filterQuestions('skipped')" class="bg-yellow-500 text-white px-3 py-1 rounded">Skipped</button>
                        <button onclick="downloadPDF()" class="bg-purple-500 text-white px-3 py-1 rounded ml-auto">📄 Download PDF</button>
                    </div>
                    
                    <div id="solveSheet" class="space-y-4 max-h-96 overflow-y-auto"></div>
                    
                    <div class="mt-6 text-center">
                        <button onclick="location.reload()" class="bg-blue-600 text-white px-6 py-2 rounded">🔄 Take Another Exam</button>
                    </div>
                </div>
            `;
            
            // Draw chart
            const ctx = document.getElementById('performanceChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: { 
                    labels: ['Correct', 'Wrong', 'Skipped'], 
                    datasets: [{ 
                        data: [result.correct, result.wrong, result.skipped], 
                        backgroundColor: ['#22c55e', '#ef4444', '#6b7280'],
                        borderWidth: 0
                    }] 
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true
                }
            });
            
            window.currentResult = result;
            renderSolveSheet('all');
        }
        
        window.filterQuestions = (filter) => {
            renderSolveSheet(filter);
        };
        
        function renderSolveSheet(filter) {
            const result = window.currentResult;
            const sheetDiv = document.getElementById('solveSheet');
            let filtered = result.detailed_results.map((r, i) => ({...r, index: i, question: result.questions[i]}));
            
            if(filter === 'correct') filtered = filtered.filter(r => r.correct === true);
            else if(filter === 'incorrect') filtered = filtered.filter(r => r.correct === false && !r.skipped);
            else if(filter === 'skipped') filtered = filtered.filter(r => r.skipped);
            
            sheetDiv.innerHTML = filtered.map(r => {
                const options = [r.question.option1, r.question.option2, r.question.option3, r.question.option4, r.question.option5].filter(opt => opt && opt.trim());
                return `
                <div class="border rounded p-4 ${r.correct ? 'border-green-300 bg-green-50' : r.skipped ? 'border-gray-300 bg-gray-50' : 'border-red-300 bg-red-50'}">
                    <div class="font-bold">Q${r.index+1}. ${r.question.questions}</div>
                    <div class="mt-2 text-sm">Your Answer: ${r.userAnswer ? String.fromCharCode(64+r.userAnswer) + '. ' + (options[r.userAnswer-1] || 'N/A') : 'Not answered'}</div>
                    <div class="text-sm">Correct Answer: ${String.fromCharCode(64+r.correctAnswer)}. ${options[r.correctAnswer-1] || 'N/A'}</div>
                    ${r.question.explanation ? `<div class="text-sm text-gray-600 mt-1">📖 Explanation: ${r.question.explanation}</div>` : ''}
                </div>
            `}).join('');
        }
        
        window.downloadPDF = () => {
            const element = document.getElementById('solveSheet');
            const opt = {
                margin: [0.5, 0.5, 0.5, 0.5],
                filename: `exam_result_${window.currentResult.student_name}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        };
        
        loadExam();
    </script>
</body>
</html>
