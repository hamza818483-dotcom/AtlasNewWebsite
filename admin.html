<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS | Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f8fafc; }
        .tab-content { display: none; }
        .active { display: block; }
    </style>
</head>
<body>
    <div id="loginArea" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md border font-bold">
            <h2 class="text-3xl text-blue-800 text-center mb-6">ADMIN LOGIN</h2>
            <input type="tel" id="adminPhone" class="w-full p-4 bg-gray-50 rounded-2xl mb-4 border" placeholder="ফোন নম্বর">
            <input type="password" id="adminPass" class="w-full p-4 bg-gray-50 rounded-2xl mb-6 border" placeholder="পাসওয়ার্ড">
            <button onclick="login()" class="w-full bg-blue-700 text-white py-4 rounded-3xl shadow-lg">লগইন</button>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <nav class="bg-white p-4 shadow-sm flex justify-between items-center sticky top-0 z-50">
            <h1 class="font-black text-blue-800">ATLAS PANEL</h1>
            <button onclick="location.reload()" class="text-red-500 font-bold text-xs">Logout</button>
        </nav>
        <div class="p-5 max-w-4xl mx-auto space-y-6">
            <div class="flex space-x-2 overflow-x-auto pb-2 font-bold">
                <button onclick="show('classes')" class="bg-blue-700 text-white px-6 py-3 rounded-2xl text-sm shadow-md">📺 ক্লাস</button>
                <button onclick="show('exams')" class="bg-white text-gray-500 px-6 py-3 rounded-2xl text-sm shadow-sm">📝 এক্সাম</button>
                <button onclick="show('students')" class="bg-white text-gray-500 px-6 py-3 rounded-2xl text-sm shadow-sm">👥 স্টুডেন্ট</button>
            </div>

            <div id="classesTab" class="tab-content active bg-white p-6 rounded-[2.5rem] shadow-sm space-y-4 font-bold">
                <h3 class="text-blue-700 underline">Add YouTube Class</h3>
                <input type="text" id="cSub" placeholder="Subject" class="w-full p-3 bg-gray-50 rounded-xl border">
                <input type="text" id="cPaper" placeholder="Paper" class="w-full p-3 bg-gray-50 rounded-xl border">
                <input type="text" id="cChap" placeholder="Chapter" class="w-full p-3 bg-gray-50 rounded-xl border">
                <input type="text" id="cLink" placeholder="YouTube Link" class="w-full p-3 bg-gray-50 rounded-xl border">
                <button onclick="saveClass()" class="w-full bg-blue-600 text-white py-3 rounded-xl">Save Class</button>
            </div>

            <div id="examsTab" class="tab-content bg-white p-6 rounded-[2.5rem] shadow-sm space-y-4 font-bold">
                <h3 class="text-green-700 underline">New Exam</h3>
                <input type="text" id="eSub" placeholder="Subject" class="w-full p-3 bg-gray-50 rounded-xl border">
                <input type="text" id="eChap" placeholder="Chapter" class="w-full p-3 bg-gray-50 rounded-xl border">
                <select id="eType" class="w-full p-3 bg-gray-50 rounded-xl border"><option value="csv">CSV Import</option><option value="link">External Link</option></select>
                <input type="file" id="csv" class="w-full p-3 bg-gray-50 rounded-xl border">
                <input type="url" id="ext" placeholder="External URL (Optional)" class="w-full p-3 bg-gray-50 rounded-xl border">
                <button onclick="saveExam()" class="w-full bg-green-600 text-white py-3 rounded-xl">Create Exam</button>
            </div>
            
            <div id="studentsTab" class="tab-content space-y-3">
                <div id="list" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://gdmhswxnlhvtyfxaevnt.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkbWhzd3hubGh2dHlmeGFldm50Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MjQyMTQsImV4cCI6MjA5MzIwMDIxNH0.0vDkuK0s6dIYWsgPmvfXXPyalpHNqkm3J--kbhck2PI';
        const atlas = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function login() {
            if(document.getElementById('adminPhone').value === "01754365403" && document.getElementById('adminPass').value === "atlas2026") {
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadStudents();
            } else { alert("ভুল তথ্য!"); }
        }

        function show(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(t+'Tab').classList.add('active');
        }

        async function saveClass() {
            const { error } = await atlas.from('classes').insert([{ subject: cSub.value, paper: cPaper.value, chapter: cChap.value, link: cLink.value }]);
            if(!error) alert("Saved!");
        }

        async function saveExam() {
            const file = csv.files[0];
            if(eType.value === 'link') {
                await atlas.from('exams').insert([{ subject: eSub.value, chapter: eChap.value, type: 'link', ext_link: ext.value }]);
                alert("Link Exam Saved!");
            } else {
                Papa.parse(file, { header: true, complete: async (r) => {
                    await atlas.from('exams').insert([{ subject: eSub.value, chapter: eChap.value, type: 'csv', questions: r.data }]);
                    alert("CSV Exam Saved!");
                }});
            }
        }

        async function loadStudents() {
            const { data } = await atlas.from('students').select('*');
            document.getElementById('list').innerHTML = data.map(s => `<div class="p-4 bg-white rounded-2xl shadow-sm border font-bold text-sm">${s.name} - ${s.hsc_batch}</div>`).join('');
        }
    </script>
</body>
</html>
