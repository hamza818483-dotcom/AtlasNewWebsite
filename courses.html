<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS | All Courses</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Sora:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background: #f0f4f8; }
        .logo-font { font-family: 'Sora', sans-serif; }
        .course-card {
            background: white; border-radius: 24px; border: 1.5px solid #f1f5f9;
            overflow: hidden; transition: all 0.25s cubic-bezier(.4,0,.2,1); cursor: pointer;
        }
        .course-card:hover { transform: translateY(-4px); border-color: #bfdbfe; box-shadow: 0 12px 40px rgba(30,64,175,0.12); }
        .course-card:active { transform: scale(0.98); }
        .gradient-bar { height: 5px; background: linear-gradient(90deg, #1e40af, #3b82f6, #7c3aed); }
        .enroll-btn {
            display: block; width: 100%; padding: 14px; text-align: center;
            background: linear-gradient(135deg, #1e40af, #1d4ed8);
            color: white; font-weight: 800; font-size: 13px; border-radius: 14px;
            text-decoration: none; letter-spacing: 0.05em; transition: 0.2s;
        }
        .enroll-btn:hover { background: linear-gradient(135deg, #1d4ed8, #2563eb); transform: scale(1.02); }
        .hero-section {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 60%, #1e40af 100%);
            padding: 32px 20px 28px; position: relative; overflow: hidden;
        }
        .hero-section::before {
            content: ''; position: absolute; top: -60px; right: -40px;
            width: 250px; height: 250px; background: rgba(59,130,246,0.15);
            border-radius: 50%;
        }
        .hero-section::after {
            content: ''; position: absolute; bottom: -80px; left: -60px;
            width: 200px; height: 200px; background: rgba(124,58,237,0.1);
            border-radius: 50%;
        }
        .empty-state { text-align: center; padding: 80px 20px; }
        .skeleton { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 20px; }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    </style>
</head>
<body class="pb-16">

    <!-- Navbar -->
    <nav class="bg-white px-5 py-4 flex items-center gap-3 sticky top-0 z-50" style="box-shadow:0 2px 20px rgba(0,0,0,0.07)">
        <a href="index.html">
            <img src="https://i.ibb.co/Vv99z9W/atlas-logo.png" alt="ATLAS" class="w-8 h-8 object-contain" onerror="this.style.display='none'">
        </a>
        <div>
            <div class="logo-font font-black text-blue-900 text-base">All Courses</div>
            <div class="text-[10px] text-gray-400 font-bold uppercase tracking-wide">সব কোর্স দেখো</div>
        </div>
    </nav>

    <!-- Hero -->
    <div class="hero-section relative z-10">
        <div class="max-w-xl mx-auto">
            <div class="text-blue-300 text-[11px] font-black uppercase tracking-widest mb-2 relative z-10">ATLAS Courses</div>
            <h1 class="logo-font text-2xl font-black text-white mb-2 relative z-10">সেরা প্রস্তুতির কোর্স 🎓</h1>
            <p class="text-blue-200 text-sm leading-relaxed relative z-10">মেডিকেল ও ভার্সিটি প্রস্তুতির জন্য বাছাই করা কোর্সসমূহ।</p>
        </div>
    </div>

    <!-- Course List -->
    <div class="max-w-xl mx-auto px-4 pt-6">
        <div class="text-[11px] font-bold text-gray-400 uppercase tracking-wide mb-4 flex items-center justify-between">
            <span>Available Courses</span>
            <span id="courseCount" class="text-blue-600"></span>
        </div>
        <div id="courseList" class="space-y-4">
            <!-- Skeleton loaders -->
            <div class="skeleton h-40"></div>
            <div class="skeleton h-40"></div>
            <div class="skeleton h-40"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://gdmhswxnlhvtyfxaevnt.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkbWhzd3hubGh2dHlmeGFldm50Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MjQyMTQsImV4cCI6MjA5MzIwMDIxNH0.0vDkuK0s6dIYWsgPmvfXXPyalpHNqkm3J--kbhck2PI';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const courseIcons = ['🧬','🔬','⚗️','🧪','📐','📊','🏥','💊','🫀','🧠','🦷','👁️'];
        const courseColors = [
            { bg: 'from-blue-500 to-blue-700', light: '#eff6ff', text: '#1e40af' },
            { bg: 'from-purple-500 to-purple-700', light: '#fdf4ff', text: '#7c3aed' },
            { bg: 'from-green-500 to-green-700', light: '#f0fdf4', text: '#16a34a' },
            { bg: 'from-orange-500 to-orange-600', light: '#fff7ed', text: '#c2410c' },
            { bg: 'from-rose-500 to-rose-700', light: '#fff1f2', text: '#e11d48' },
        ];

        window.onload = async () => {
            const { data, error } = await db.from('courses').select('*').order('created_at', { ascending: false });
            const container = document.getElementById('courseList');
            const countEl = document.getElementById('courseCount');

            if(!data || data.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="text-5xl mb-4">📚</div>
                        <h3 class="logo-font font-black text-gray-700 text-lg mb-2">এখনো কোনো কোর্স নেই</h3>
                        <p class="text-gray-400 text-sm">শীঘ্রই নতুন কোর্স আসছে!</p>
                    </div>`;
                countEl.textContent = '০ টি';
                return;
            }

            countEl.textContent = data.length + ' টি';

            container.innerHTML = data.map((course, i) => {
                const icon = courseIcons[i % courseIcons.length];
                const colorScheme = courseColors[i % courseColors.length];

                return `
                <div class="course-card" onclick="window.open('${course.link || '#'}', '_blank')">
                    <div class="gradient-bar"></div>
                    <div class="p-6">
                        <div class="flex items-start gap-4 mb-5">
                            <div class="w-14 h-14 rounded-2xl bg-gradient-to-br ${colorScheme.bg} flex items-center justify-center text-2xl flex-shrink-0 shadow-lg">
                                ${icon}
                            </div>
                            <div class="flex-1 min-w-0">
                                <h3 class="logo-font font-black text-gray-900 text-[17px] leading-snug mb-1">${course.name || 'Course'}</h3>
                                ${course.description ? `<p class="text-gray-500 text-xs leading-relaxed">${course.description}</p>` : ''}
                            </div>
                        </div>

                        ${course.features ? `
                        <div class="flex flex-wrap gap-2 mb-5">
                            ${course.features.split(',').map(f => `<span style="background:${colorScheme.light};color:${colorScheme.text};border-radius:20px;padding:3px 12px;font-size:10px;font-weight:800;">${f.trim()}</span>`).join('')}
                        </div>` : ''}

                        <a href="${course.link || '#'}" target="_blank" class="enroll-btn" onclick="event.stopPropagation()">
                            কোর্সে যোগ দাও →
                        </a>
                    </div>
                </div>`;
            }).join('');
        };
    </script>
</body>
</html>
