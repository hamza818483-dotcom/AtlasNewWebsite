<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS | পড়াশোনা হোক গোছানো</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Sora:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --blue:#1e40af; --dark:#0f172a; --accent:#3b82f6; }
        * { box-sizing:border-box; }
        body { font-family:'Hind Siliguri',sans-serif; background:#f0f4f8; min-height:100vh; }
        .logo-font { font-family:'Sora',sans-serif; }
        .nav-shadow { box-shadow:0 2px 20px rgba(0,0,0,0.07); }
        .card { background:white; border-radius:28px; border:1.5px solid #f1f5f9; transition:all 0.25s cubic-bezier(.4,0,.2,1); cursor:pointer; }
        .card:hover { transform:translateY(-4px); border-color:#bfdbfe; box-shadow:0 12px 40px rgba(30,64,175,0.1); }
        .card:active { transform:scale(0.98); }
        .icon-box { border-radius:18px; width:56px; height:56px; display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; }
        .countdown-card { background:linear-gradient(135deg,#1e40af 0%,#1d4ed8 50%,#1e3a8a 100%); border-radius:28px; padding:24px; color:white; position:relative; overflow:hidden; margin-bottom: 12px; }
        .countdown-card::before { content:''; position:absolute; top:-50%;right:-30%;width:200px;height:200px;background:rgba(255,255,255,0.05);border-radius:50%; }
        .countdown-num { font-family:'Sora',sans-serif; font-size:32px; font-weight:900; line-height:1; }
        .countdown-label { font-size:10px; font-weight:700; opacity:0.7; text-transform:uppercase; letter-spacing:0.08em; }
        .section-title { font-family:'Sora',sans-serif; font-size:13px; font-weight:800; color:#94a3b8; text-transform:uppercase; letter-spacing:0.12em; margin-bottom:12px; padding-left:4px; }
        .profile-chip { background:white; border:1.5px solid #e2e8f0; border-radius:50px; padding:6px 16px 6px 8px; display:flex; align-items:center; gap:8px; cursor:pointer; transition:0.2s; }
        .profile-chip:hover { border-color:#bfdbfe; }
        .avatar { width:32px;height:32px;background:linear-gradient(135deg,#1e40af,#3b82f6);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:900;font-size:12px; }
        .badge { background:#eff6ff; color:#1e40af; border-radius:20px; padding:3px 10px; font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:0.08em; }
    </style>
</head>
<body>
    <nav class="bg-white px-5 py-4 flex items-center justify-between nav-shadow sticky top-0 z-50">
        <a href="index.html" class="flex items-center space-x-2">
            <img src="https://i.ibb.co/Vv99z9W/atlas-logo.png" alt="ATLAS Logo" class="w-9 h-9 object-contain" onerror="this.style.display='none'">
            <span class="logo-font text-xl font-black text-blue-900 tracking-tight">ATLAS</span>
        </a>
        <div id="profileArea">
            <button onclick="goRegister()" class="bg-blue-700 text-white text-xs font-black px-4 py-2.5 rounded-full shadow-lg uppercase tracking-wide">Login / Register</button>
        </div>
    </nav>

    <div class="max-w-xl mx-auto px-4 pb-16 pt-6">

        <div class="mb-6">
            <h1 class="logo-font text-2xl font-black text-gray-900 leading-snug">আস্সালামু আলাইকুম! 👋</h1>
            <p class="text-gray-500 text-sm mt-1.5">মেডিকেল ও ভার্সিটি প্রস্তুতির পূর্ণাঙ্গ প্ল্যাটফর্ম।</p>
        </div>

        <div id="countdownSection" class="mb-6 space-y-4 hidden">
            <div class="section-title">⏰ Upcoming Events</div>
            <div id="countdownCards"></div>
        </div>

        <div class="section-title">Quick Access</div>
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="card p-5 flex items-center space-x-3" onclick="handleNav('classes.html')">
                <div class="icon-box bg-red-50">📺</div>
                <div><div class="font-bold text-gray-800 text-[15px]">Free Classes</div><div class="text-[10px] text-gray-400 font-bold uppercase tracking-wide">ভিডিও দেখো</div></div>
            </div>
            <div class="card p-5 flex items-center space-x-3" onclick="handleNav('exams.html')">
                <div class="icon-box bg-green-50">📝</div>
                <div><div class="font-bold text-gray-800 text-[15px]">Free Exams</div><div class="text-[10px] text-gray-400 font-bold uppercase tracking-wide">পরীক্ষা দাও</div></div>
            </div>
            <div class="card p-5 flex items-center space-x-3" onclick="handleNav('courses.html')">
                <div class="icon-box bg-orange-50">🔥</div>
                <div><div class="font-bold text-gray-800 text-[15px]">Courses</div><div class="text-[10px] text-gray-400 font-bold uppercase tracking-wide">ব্যাচ দেখো</div></div>
            </div>
            <div class="card p-5 flex items-center space-x-3" onclick="handleNav('reviews.html')">
                <div class="icon-box bg-yellow-50">⭐</div>
                <div><div class="font-bold text-gray-800 text-[15px]">Reviews</div><div class="text-[10px] text-gray-400 font-bold uppercase tracking-wide">মতামত দেখো</div></div>
            </div>
        </div>

        <div id="recentExamsSection" class="mb-6 space-y-3 hidden">
            <div class="section-title">📝 Recent Free Exams</div>
            <div id="recentExamsList" class="space-y-3"></div>
        </div>

        <div id="dynBtns" class="mb-6 space-y-3"></div>

        <div id="studentCard" class="hidden mb-6 card p-6">
            <div class="flex items-center justify-between mb-4">
                <div class="logo-font font-black text-gray-800 text-sm uppercase tracking-wide">My Profile</div>
                <a href="profile.html" class="text-blue-600 text-xs font-bold">বিস্তারিত →</a>
            </div>
            <div class="flex items-center gap-4">
                <div class="avatar text-lg" id="profileAvatar">A</div>
                <div>
                    <div class="font-bold text-gray-800" id="profileName">—</div>
                    <div class="text-xs text-gray-400" id="profileCollege">—</div>
                </div>
            </div>
        </div>

        <footer class="text-center mt-10">
            <p class="text-gray-300 text-[10px] font-bold uppercase tracking-widest">© 2026 Powered by ATLAS Team</p>
            <div class="mt-3"><a href="admin.html" class="text-gray-300 text-[10px] font-bold uppercase border-b border-gray-200 pb-0.5">Admin Access</a></div>
        </footer>
    </div>

    <script>
        const SUPABASE_URL = 'https://gdmhswxnlhvtyfxaevnt.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkbWhzd3hubGh2dHlmeGFldm50Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MjQyMTQsImV4cCI6MjA5MzIwMDIxNH0.0vDkuK0s6dIYWsgPmvfXXPyalpHNqkm3J--kbhck2PI';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const timers = {};

        window.onload = async () => {
            loadProfile();
            await loadDynButtons();
            await loadCountdowns();
            await loadRecentExams(); // New logic connected
        };

        function loadProfile() {
            const raw = localStorage.getItem('atlas_user');
            const profileArea = document.getElementById('profileArea');
            if(raw) {
                const user = JSON.parse(raw);
                document.getElementById('studentCard').classList.remove('hidden');
                document.getElementById('profileName').textContent = user.name || '—';
                document.getElementById('profileCollege').textContent = user.college || '—';
                document.getElementById('profileAvatar').textContent = (user.name || 'A')[0].toUpperCase();
                profileArea.innerHTML = `
                    <div class="profile-chip" onclick="window.location.href='profile.html'">
                        <div class="avatar">${(user.name||'A')[0].toUpperCase()}</div>
                        <span class="text-xs font-bold text-gray-700">${user.name || 'Profile'}</span>
                    </div>`;
            }
        }

        async function loadRecentExams() {
            // Fetch latest 3 exams to show on home
            const { data, error } = await db.from('exams').select('*').order('created_at', { ascending: false }).limit(3);
            if(data && data.length > 0) {
                const section = document.getElementById('recentExamsSection');
                const list = document.getElementById('recentExamsList');
                section.classList.remove('hidden');
                data.forEach(ex => {
                    const div = document.createElement('div');
                    div.className = 'card p-5 flex items-center space-x-3';
                    div.onclick = () => handleNav(`exam-hall.html?id=${ex.exam_id}`);
                    div.innerHTML = `
                        <div class="icon-box bg-green-50 text-xl">📝</div>
                        <div class="flex-1">
                            <div class="font-bold text-gray-800 text-[14px] leading-tight">${ex.subject}: ${ex.chapter}</div>
                            <div class="text-[10px] text-gray-400 font-bold uppercase tracking-wide mt-1">${ex.duration} Mins • Live Now</div>
                        </div>
                        <div class="text-blue-600 text-lg font-black">→</div>`;
                    list.appendChild(div);
                });
            }
        }

        function goRegister() {
            localStorage.setItem('atlas_redirect', 'index.html');
            window.location.href = 'register.html';
        }

        function handleNav(url) {
            const publicPages = ['reviews.html', 'courses.html'];
            const raw = localStorage.getItem('atlas_user');
            if(!raw && !publicPages.some(p => url.includes(p))) {
                localStorage.setItem('atlas_redirect', url);
                window.location.href = 'register.html';
                return;
            }
            window.location.href = url;
        }

        async function loadDynButtons() {
            const { data } = await db.from('home_buttons').select('*').order('created_at', {ascending: false});
            if(data && data.length > 0) {
                const container = document.getElementById('dynBtns');
                data.forEach(btn => {
                    const div = document.createElement('div');
                    div.className = 'card p-5 flex items-center space-x-3';
                    div.onclick = () => handleNav(btn.link || '#');
                    div.innerHTML = `
                        <div class="icon-box bg-blue-50">${btn.icon || '🚀'}</div>
                        <div><div class="font-bold text-gray-800 text-[15px]">${btn.name}</div><div class="text-[10px] text-gray-400 font-bold uppercase tracking-wide">দেখো</div></div>`;
                    container.appendChild(div);
                });
            }
        }

        async function loadCountdowns() {
            const { data } = await db.from('countdown_cards').select('*').eq('active', true).order('end_time');
            if(data && data.length > 0) {
                document.getElementById('countdownSection').classList.remove('hidden');
                const container = document.getElementById('countdownCards');
                data.forEach(cd => {
                    const div = document.createElement('div');
                    div.className = 'countdown-card';
                    div.id = 'cd_' + cd.id;
                    div.innerHTML = `
                        <p class="text-blue-200 text-xs font-bold uppercase tracking-widest mb-3 relative z-10">${cd.title}</p>
                        <div class="flex gap-6 relative z-10" id="timer_${cd.id}">
                            <div class="text-center"><div class="countdown-num" id="d_${cd.id}">00</div><div class="countdown-label">Days</div></div>
                            <div class="text-center"><div class="countdown-num" id="h_${cd.id}">00</div><div class="countdown-label">Hours</div></div>
                            <div class="text-center"><div class="countdown-num" id="m_${cd.id}">00</div><div class="countdown-label">Mins</div></div>
                            <div class="text-center"><div class="countdown-num" id="s_${cd.id}">00</div><div class="countdown-label">Secs</div></div>
                        </div>`;
                    container.appendChild(div);
                    startCountdown(cd.id, cd.end_time);
                });
            }
        }

        function startCountdown(id, endTime) {
            const end = new Date(endTime).getTime();
            function tick() {
                const now = Date.now();
                const diff = end - now;
                if(diff <= 0) {
                    ['d','h','m','s'].forEach(u => { const el = document.getElementById(u+'_'+id); if(el) el.textContent='00'; });
                    return;
                }
                const d = Math.floor(diff/(1000*60*60*24));
                const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
                const m = Math.floor((diff%(1000*60*60))/(1000*60));
                const s = Math.floor((diff%60000)/1000);
                const fmt = n => String(n).padStart(2,'0');
                ['d','h','m','s'].forEach((u,i) => {
                    const el = document.getElementById(u+'_'+id);
                    if(el) el.textContent = fmt([d,h,m,s][i]);
                });
            }
            tick();
            timers[id] = setInterval(tick, 1000);
        }
    </script>
</body>
</html>
