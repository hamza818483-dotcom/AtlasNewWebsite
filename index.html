<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS | পড়াশোনা হোক গোছানো</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Sora:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --blue:#1e40af; --dark:#0f172a; --accent:#3b82f6; }
        * { box-sizing:border-box; }
        body { font-family:'Hind Siliguri',sans-serif; background:#f0f4f8; min-height:100vh; }
        .logo-font { font-family:'Sora',sans-serif; }
        .nav-shadow { box-shadow:0 2px 20px rgba(0,0,0,0.07); }
        .card { background:white; border-radius:28px; border:1.5px solid #f1f5f9; transition:all 0.25s cubic-bezier(.4,0,.2,1); cursor:pointer; }
        .card:hover { transform:translateY(-4px); border-color:#bfdbfe; box-shadow:0 12px 40px rgba(30,64,175,0.1); }
        .card:active { transform:scale(0.98); }
        .icon-box { border-radius:18px; width:56px; height:56px; display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; }
        .countdown-card { background:linear-gradient(135deg,#1e40af 0%,#1d4ed8 50%,#1e3a8a 100%); border-radius:28px; padding:24px; color:white; position:relative; overflow:hidden; }
        .countdown-card::before { content:''; position:absolute; top:-50%;right:-30%;width:200px;height:200px;background:rgba(255,255,255,0.05);border-radius:50%; }
        .countdown-num { font-family:'Sora',sans-serif; font-size:32px; font-weight:900; line-height:1; }
        .countdown-label { font-size:10px; font-weight:700; opacity:0.7; text-transform:uppercase; letter-spacing:0.08em; }
        .section-title { font-family:'Sora',sans-serif; font-size:13px; font-weight:800; color:#94a3b8; text-transform:uppercase; letter-spacing:0.12em; margin-bottom:12px; padding-left:4px; }
        .profile-chip { background:white; border:1.5px solid #e2e8f0; border-radius:50px; padding:6px 16px 6px 8px; display:flex; align-items:center; gap:8px; cursor:pointer; transition:0.2s; }
        .profile-chip:hover { border-color:#bfdbfe; }
        .avatar { width:32px;height:32px;background:linear-gradient(135deg,#1e40af,#3b82f6);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:900;font-size:12px; }
        .badge { background:#eff6ff; color:#1e40af; border-radius:20px; padding:3px 10px; font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:0.08em; }
        
        /* NEW FEATURES CSS START */
        /* ডাইনামিক বাটন গ্রিড স্টাইল */
        .btn-subtitle { font-size: 10px; color: #94a3b8; font-weight: 600; margin-top: 2px; }
        
        /* পুরানো ব্যানারের CSS রেখে দেওয়া হলো (ডিলিট রুল অনুযায়ী) */
        .instructor-card {
            position: relative; padding: 3px; 
            background: linear-gradient(90deg, #1e40af, #7c3aed, #1e40af);
            background-size: 200% 100%; animation: rotateGlow 3s linear infinite;
            border-radius: 28px; cursor: pointer; transition: 0.3s;
        }
        .instructor-card:active { transform: scale(0.98); }
        .instructor-inner { background: #0f172a; border-radius: 25px; padding: 18px 20px; display: flex; align-items: center; gap: 15px; }
        
        /* পপআপ মডাল স্টাইল (ডিলিট রুল অনুযায়ী রেখে দেওয়া হলো) */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px);
        }

        /* --- নতুন FLIPCARD CSS শুরু --- */
        @keyframes rotateGlow { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }

        .flip-card-container {
            perspective: 1000px;
            width: 100%;
            max-width: 300px; /* ইমেজের চওড়া */
            height: 380px; /* ইমেজের উচ্চতা */
            margin: 0 auto;
            margin-top: 20px;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        /* ক্লিক করলে এই ক্লাসটি অ্যাড হবে এবং কার্ডটি ঘুরবে */
        .flip-card-inner.flipped {
            transform: rotateY(180deg);
        }

        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 32px;
        }

        /* ফ্রন্ট সাইড: ফুল ইমেজ এবং গ্লোয়িং বর্ডার */
        .flip-card-front {
            padding: 5px; /* এই প্যাডিংটাই বর্ডারের মতো কাজ করবে */
            background: linear-gradient(90deg, #3b82f6, #7c3aed, #1e40af, #3b82f6);
            background-size: 300% 100%;
            animation: rotateGlow 3s linear infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px rgba(30, 64, 175, 0.2);
        }

        .flip-card-front img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 28px; /* বর্ডারের ভেতরের ইমেজের রাউন্ড শেপ */
        }

        /* ইমেজের ওপরের ভাসমান লেখা */
        .flip-overlay {
            position: absolute;
            bottom: 25px;
            left: 0;
            width: 100%;
            text-align: center;
        }

        .flip-overlay span {
            background: rgba(15, 23, 42, 0.85);
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 800;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
            letter-spacing: 0.05em;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* ব্যাক সাইড: পরিচিতি ও বিস্তারিত */
        .flip-card-back {
            background: #0f172a; /* ডার্ক ব্যাকগ্রাউন্ড */
            color: white;
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
            text-align: center;
            border: 2px solid #1e40af;
            box-shadow: 0 15px 35px rgba(15, 23, 42, 0.4);
        }
        /* --- নতুন FLIPCARD CSS শেষ --- */
    </style>
</head>
<body>
    <nav class="bg-white px-5 py-4 flex items-center justify-between nav-shadow sticky top-0 z-50">
        <a href="index.html" class="flex items-center space-x-2">
            <img src="https://i.ibb.co/Vv99z9W/atlas-logo.png" alt="ATLAS Logo" class="w-9 h-9 object-contain" onerror="this.style.display='none'">
            <span class="logo-font text-xl font-black text-blue-900 tracking-tight">ATLAS</span>
        </a>
        <div id="profileArea">
            <button onclick="goRegister()" class="bg-blue-700 text-white text-xs font-black px-4 py-2.5 rounded-full shadow-lg uppercase tracking-wide">Login / Register</button>
        </div>
    </nav>

    <div class="max-w-xl mx-auto px-4 pb-16 pt-6">
        <div class="mb-6">
            <h1 class="logo-font text-2xl font-black text-gray-900 leading-snug">আস্সালামু আলাইকুম! 👋</h1>
            <p class="text-gray-500 text-sm mt-1.5">মেডিকেল ও ভার্সিটি প্রস্তুতির পূর্ণাঙ্গ প্ল্যাটফর্ম।</p>
        </div>

        <div id="countdownSection" class="mb-6 space-y-4 hidden">
            <div class="section-title">⏰ Upcoming Events</div>
            <div id="countdownCards"></div>
        </div>

        <div class="section-title">Quick Access</div>
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="card p-5 flex items-center space-x-3" onclick="handleNav('classes.html')">
                <div class="icon-box bg-red-50">📺</div>
                <div><div class="font-bold text-gray-800 text-[15px]">Free Classes</div><div class="text-[10px] text-gray-400 font-bold uppercase tracking-wide">ভিডিও দেখো</div></div>
            </div>
            <div class="card p-5 flex items-center space-x-3" onclick="handleNav('exams.html')">
                <div class="icon-box bg-green-50">📝</div>
                <div><div class="font-bold text-gray-800 text-[15px]">Free Exams</div><div class="text-[10px] text-gray-400 font-bold uppercase tracking-wide">পরীক্ষা দাও</div></div>
            </div>
            <div class="card p-5 flex items-center space-x-3" onclick="handleNav('courses.html')">
                <div class="icon-box bg-orange-50">🔥</div>
                <div><div class="font-bold text-gray-800 text-[15px]">Courses</div><div class="text-[10px] text-gray-400 font-bold uppercase tracking-wide">ব্যাচ দেখো</div></div>
            </div>
            <div class="card p-5 flex items-center space-x-3" onclick="handleNav('reviews.html')">
                <div class="icon-box bg-yellow-50">⭐</div>
                <div><div class="font-bold text-gray-800 text-[15px]">Reviews</div><div class="text-[10px] text-gray-400 font-bold uppercase tracking-wide">মতামত দেখো</div></div>
            </div>
        </div>

        <div id="dynBtns" class="grid grid-cols-2 gap-3 mb-6"></div>

        <div id="studentCard" class="hidden mb-6 card p-6">
            <div class="flex items-center justify-between mb-4">
                <div class="logo-font font-black text-gray-800 text-sm uppercase tracking-wide">My Profile</div>
                <a href="profile.html" class="text-blue-600 text-xs font-bold">বিস্তারিত →</a>
            </div>
            <div class="flex items-center gap-4">
                <div class="avatar text-lg" id="profileAvatar">A</div>
                <div>
                    <div class="font-bold text-gray-800" id="profileName">—</div>
                    <div class="text-xs text-gray-400" id="profileCollege">—</div>
                </div>
            </div>
        </div>

        <div id="instructorSection" class="mb-10 mt-10"></div>

        <footer class="text-center mt-10">
            <p class="text-gray-300 text-[10px] font-bold uppercase tracking-widest">© 2026 Powered by ATLAS Team</p>
            <div class="mt-3"><a href="admin.html" class="text-gray-300 text-[10px] font-bold uppercase border-b border-gray-200 pb-0.5">Admin Access</a></div>
        </footer>
    </div>

    <div id="profileModal" class="modal-overlay" onclick="closeProfileModal()">
        <div class="bg-white rounded-[2.5rem] p-8 max-w-sm w-full text-center relative shadow-2xl" onclick="event.stopPropagation()">
            <div class="absolute -top-12 left-1/2 transform -translate-x-1/2">
                <img id="modalImg" src="" class="w-24 h-24 rounded-full object-cover border-4 border-white shadow-lg bg-gray-100">
            </div>
            <div class="mt-12">
                <h3 id="modalName" class="logo-font font-black text-gray-900 text-xl leading-tight"></h3>
                <p id="modalTitle" class="text-blue-600 font-bold text-[11px] mb-4 uppercase tracking-widest"></p>
                <div class="bg-blue-50/50 p-4 rounded-2xl">
                    <p id="modalDesc" class="text-gray-600 text-sm leading-relaxed font-medium"></p>
                </div>
                <button onclick="closeProfileModal()" class="mt-6 w-full bg-gray-900 text-white py-4 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl">বন্ধ করো</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://gdmhswxnlhvtyfxaevnt.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkbWhzd3hubGh2dHlmeGFldm50Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MjQyMTQsImV4cCI6MjA5MzIwMDIxNH0.0vDkuK0s6dIYWsgPmvfXXPyalpHNqkm3J--kbhck2PI';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const timers = {};

        window.onload = async () => {
            loadProfile();
            await loadDynButtons();
            await loadInstructor(); 
            await loadCountdowns();
        };

        function loadProfile() {
            const raw = localStorage.getItem('atlas_user');
            const profileArea = document.getElementById('profileArea');
            if(raw) {
                const user = JSON.parse(raw);
                document.getElementById('studentCard').classList.remove('hidden');
                document.getElementById('profileName').textContent = user.name || '—';
                document.getElementById('profileCollege').textContent = user.college || '—';
                document.getElementById('profileAvatar').textContent = (user.name || 'A')[0].toUpperCase();
                profileArea.innerHTML = `
                    <div class="profile-chip" onclick="window.location.href='profile.html'">
                        <div class="avatar">${(user.name||'A')[0].toUpperCase()}</div>
                        <span class="text-xs font-bold text-gray-700">${user.name || 'Profile'}</span>
                    </div>`;
            }
        }

        function goRegister() {
            localStorage.setItem('atlas_redirect', 'index.html');
            window.location.href = 'register.html';
        }

        function handleNav(url) {
            const publicPages = ['reviews.html', 'courses.html'];
            const raw = localStorage.getItem('atlas_user');
            if(!raw && !publicPages.includes(url)) {
                localStorage.setItem('atlas_redirect', url);
                window.location.href = 'register.html';
                return;
            }
            window.location.href = url;
        }

        function formatSafeUrl(url) {
            if (!url || url.trim() === '' || url === '#') return '#';
            let clean = url.trim();
            if (!clean.startsWith('http://') && !clean.startsWith('https://')) {
                return 'https://' + clean;
            }
            return clean;
        }

        async function loadDynButtons() {
            const { data, error } = await db.from('home_buttons').select('*').order('priority', {ascending: true});
            if(data && data.length > 0) {
                const container = document.getElementById('dynBtns');
                container.innerHTML = data.map(btn => {
                    const safeLink = formatSafeUrl(btn.link);
                    return `
                    <div class="card p-5 flex flex-col items-center justify-center text-center space-y-2" onclick="window.open('${safeLink}', '_blank')">
                        <div class="text-4xl mb-1">${btn.icon || '🔗'}</div>
                        <div class="font-black text-gray-800 text-[14px] leading-tight">${btn.name}</div>
                        ${btn.subtitle ? `<div class="btn-subtitle">${btn.subtitle}</div>` : ''}
                    </div>`;
                }).join('');
            }
        }

        // UPDATED FEATURE: Instructor Load with 3D Flipcard
        async function loadInstructor() {
            const { data: profile, error } = await db.from('instructor_profile').select('*').eq('id', 1).single();
            if(profile && profile.name) {
                window.currentProfile = profile; // Old modal backup
                
                document.getElementById('instructorSection').innerHTML = `
                    <div class="section-title text-center mb-2">Meet the Owner</div>
                    
                    <div class="flip-card-container" onclick="this.querySelector('.flip-card-inner').classList.toggle('flipped')">
                        <div class="flip-card-inner">
                            
                            <div class="flip-card-front">
                                <img src="${profile.image_url || 'https://via.placeholder.com/300x400?text=Instructor+Image'}" alt="Instructor">
                                <div class="flip-overlay">
                                    <span>পরিচয় জানতে ছবিতে ক্লিক 🔄</span>
                                </div>
                            </div>

                            <div class="flip-card-back">
                                <div class="w-16 h-16 bg-blue-900 rounded-full flex items-center justify-center text-3xl mb-4 border-2 border-blue-500 shadow-lg">🎓</div>
                                <h3 class="logo-font font-black text-2xl mb-1 text-white">${profile.name}</h3>
                                <p class="text-blue-400 font-bold text-[10px] uppercase tracking-widest mb-4">${profile.title || 'Lead Instructor'}</p>
                                
                                <div class="bg-white/10 p-4 rounded-2xl w-full backdrop-blur border border-white/10">
                                    <p class="text-gray-300 text-sm leading-relaxed font-medium">${profile.description || 'Welcome to ATLAS learning platform.'}</p>
                                </div>
                                
                                <p class="text-gray-500 text-[9px] mt-6 uppercase tracking-widest font-bold">আবার ক্লিক করে ছবি দেখো</p>
                            </div>

                        </div>
                    </div>
                `;
            }
        }

        // Old Modal Functions (Kept intact per strict rules)
        function openProfileModal() {
            const p = window.currentProfile;
            if(!p) return;
            document.getElementById('modalImg').src = p.image_url || 'https://via.placeholder.com/150';
            document.getElementById('modalName').innerText = p.name;
            document.getElementById('modalTitle').innerText = p.title || 'Instructor';
            document.getElementById('modalDesc').innerText = p.description || 'Welcome to ATLAS.';
            document.getElementById('profileModal').style.display = 'flex';
        }

        function closeProfileModal() {
            document.getElementById('profileModal').style.display = 'none';
        }

        async function loadCountdowns() {
            const { data } = await db.from('countdown_cards').select('*').eq('active', true).order('end_time');
            if(data && data.length > 0) {
                document.getElementById('countdownSection').classList.remove('hidden');
                const container = document.getElementById('countdownCards');
                data.forEach(cd => {
                    const div = document.createElement('div');
                    div.className = 'countdown-card';
                    div.id = 'cd_' + cd.id;
                    div.innerHTML = `
                        <p class="text-blue-200 text-xs font-bold uppercase tracking-widest mb-3 relative z-10">${cd.title}</p>
                        <div class="flex gap-6 relative z-10" id="timer_${cd.id}">
                            <div class="text-center"><div class="countdown-num" id="d_${cd.id}">00</div><div class="countdown-label">Days</div></div>
                            <div class="text-center"><div class="countdown-num" id="h_${cd.id}">00</div><div class="countdown-label">Hours</div></div>
                            <div class="text-center"><div class="countdown-num" id="m_${cd.id}">00</div><div class="countdown-label">Mins</div></div>
                            <div class="text-center"><div class="countdown-num" id="s_${cd.id}">00</div><div class="countdown-label">Secs</div></div>
                        </div>`;
                    container.appendChild(div);
                    startCountdown(cd.id, cd.end_time);
                });
            }
        }

        function startCountdown(id, endTime) {
            const end = new Date(endTime).getTime();
            function tick() {
                const now = Date.now();
                const diff = end - now;
                if(diff <= 0) {
                    ['d','h','m','s'].forEach(u => { const el = document.getElementById(u+'_'+id); if(el) el.textContent='00'; });
                    return;
                }
                const d = Math.floor(diff/(1000*60*60*24));
                const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
                const m = Math.floor((diff%(1000*60*60))/(1000*60));
                const s = Math.floor((diff%60000)/1000);
                const fmt = n => String(n).padStart(2,'0');
                ['d','h','m','s'].forEach((u,i) => {
                    const el = document.getElementById(u+'_'+id);
                    if(el) el.textContent = fmt([d,h,m,s][i]);
                });
            }
            tick();
            timers[id] = setInterval(tick, 1000);
        }
    </script>
</body>
</html>
