<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f3f7fa; }
        .nav-shadow { box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        .dynamic-card { transition: 0.3s; }
        .dynamic-card:hover { transform: translateY(-5px); border-color: #1e40af; }
    </style>
</head>
<body class="pb-10">
    <nav class="bg-white px-6 py-4 flex items-center justify-between nav-shadow sticky top-0 z-50">
        <div class="flex items-center space-x-2">
            <img src="https://i.ibb.co/Vv99z9W/atlas-logo.png" alt="Logo" class="w-10 h-10">
            <span class="text-2xl font-black text-blue-800 tracking-tighter italic uppercase">ATLAS</span>
        </div>
        <div class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-[10px] font-black border border-blue-100 uppercase tracking-widest">
            Admission Care
        </div>
    </nav>

    <header class="p-8 bg-gradient-to-br from-blue-700 via-blue-800 to-indigo-900 text-white rounded-b-[3rem] shadow-xl mb-10">
        <h1 class="text-3xl font-bold leading-tight">আসসালামু আলাইকুম! 👋</h1>
        <p class="text-blue-100 text-sm mt-2 opacity-90">মেডিকেল ও ভার্সিটি প্রস্তুতির পূর্ণাঙ্গ প্ল্যাটফর্মে তোমাকে স্বাগতম।</p>
        <div class="mt-6 flex space-x-3">
            <div class="bg-white/10 backdrop-blur-md px-4 py-2 rounded-2xl border border-white/20 text-center min-w-[100px]">
                <p class="text-[10px] uppercase opacity-70">Batch</p>
                <p class="font-bold text-sm">HSC 25/26</p>
            </div>
            <div class="bg-white/10 backdrop-blur-md px-4 py-2 rounded-2xl border border-white/20 text-center min-w-[100px]">
                <p class="text-[10px] uppercase opacity-70">Status</p>
                <p class="font-bold text-sm">Admission</p>
            </div>
        </div>
    </header>

    <main class="px-6 grid grid-cols-1 md:grid-cols-2 gap-5" id="mainGrid">
        <div onclick="handleRedirect('classes.html')" class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100 flex items-center space-x-5 cursor-pointer active:scale-95 dynamic-card">
            <div class="bg-red-50 p-4 rounded-[1.5rem] text-3xl">📺</div>
            <div>
                <h3 class="text-lg font-bold text-gray-800">Free Classes</h3>
                <p class="text-gray-400 text-xs font-bold uppercase tracking-wider">ভিডিও ক্লাসগুলো দেখো</p>
            </div>
        </div>

        <div onclick="handleRedirect('exams.html')" class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100 flex items-center space-x-5 cursor-pointer active:scale-95 dynamic-card">
            <div class="bg-green-50 p-4 rounded-[1.5rem] text-3xl">📝</div>
            <div>
                <h3 class="text-lg font-bold text-gray-800">Free Exams</h3>
                <p class="text-gray-400 text-xs font-bold uppercase tracking-wider">নিজেকে যাচাই করো</p>
            </div>
        </div>

        </main>

    <section class="mt-12 px-6">
        <h2 class="text-xl font-black text-blue-900 uppercase italic mb-6 ml-2">What Students Say ⭐</h2>
        <div id="reviewGrid" class="flex overflow-x-auto space-x-4 pb-4 scrollbar-hide">
            </div>
    </section>

    <footer class="mt-12 text-center pb-10">
        <p class="text-gray-300 text-[10px] font-bold tracking-[0.2em] uppercase">Powered by ATLAS Team</p>
        <div class="mt-6">
            <a href="admin.html" class="text-gray-400 text-[10px] font-bold uppercase tracking-[0.3em] border-b border-gray-200 pb-1 hover:text-blue-800 transition-all">Admin Access</a>
        </div>
    </footer>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://gdmhswxnlhvtyfxaevnt.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkbWhzd3hubGh2dHlmeGFldm50Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MjQyMTQsImV4cCI6MjA5MzIwMDIxNH0.0vDkuK0s6dIYWsgPmvfXXPyalpHNqkm3J--kbhck2PI';
        const atlas = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        window.onload = () => {
            fetchDynamicButtons();
            fetchReviews();
        };

        // ১. অ্যাডমিন থেকে অ্যাড করা বাটনগুলো লোড করা
        async function fetchDynamicButtons() {
            const { data, error } = await atlas.from('home_buttons').select('*');
            if (data) {
                const mainGrid = document.getElementById('mainGrid');
                data.forEach(btn => {
                    const btnHtml = `
                        <div onclick="handleRedirect('${btn.link}')" class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100 flex items-center space-x-5 cursor-pointer active:scale-95 dynamic-card">
                            <div class="bg-blue-50 p-4 rounded-[1.5rem] text-3xl">${btn.icon || '🚀'}</div>
                            <div>
                                <h3 class="text-lg font-bold text-gray-800">${btn.name}</h3>
                                <p class="text-gray-400 text-xs font-bold uppercase tracking-wider">ক্লিক করে বিস্তারিত দেখো</p>
                            </div>
                        </div>
                    `;
                    mainGrid.insertAdjacentHTML('beforeend', btnHtml);
                });
            }
        }

        // ২. অ্যাডমিন থেকে অ্যাড করা রিভিউগুলো লোড করা
        async function fetchReviews() {
            const { data, error } = await atlas.from('reviews').select('*').order('created_at', {ascending: false});
            const reviewGrid = document.getElementById('reviewGrid');
            if (data && data.length > 0) {
                reviewGrid.innerHTML = data.map(rev => `
                    <div class="min-w-[280px] bg-white p-6 rounded-[2rem] shadow-sm border border-gray-50">
                        <div class="flex items-center space-x-3 mb-4">
                            <img src="${rev.photo_url || 'https://via.placeholder.com/50'}" class="w-12 h-12 rounded-full border-2 border-blue-100 object-cover">
                            <div>
                                <h4 class="font-bold text-sm text-gray-800">${rev.student_name}</h4>
                                <p class="text-[10px] text-blue-600 font-bold uppercase">${rev.category}</p>
                            </div>
                        </div>
                        <p class="text-gray-600 text-xs leading-relaxed italic">"${rev.comment}"</p>
                    </div>
                `).join('');
            } else {
                reviewGrid.innerHTML = `<p class="text-gray-400 text-xs ml-2 italic">No reviews yet.</p>`;
            }
        }

        function handleRedirect(url) {
            const userData = localStorage.getItem('atlas_user');
            if (!userData && url !== 'admin.html') {
                alert("কন্টেন্ট দেখতে আগে ছোট একটি রেজিস্ট্রেশন সম্পূর্ণ করো!");
                window.location.href = 'register.html';
            } else {
                // যদি পূর্ণাঙ্গ URL (http) হয় তবে সরাসরি যাবে, নাহলে লোকাল ফাইল খুঁজবে
                if (url.startsWith('http')) {
                    window.location.href = url;
                } else {
                    window.location.href = url;
                }
            }
        }
    </script>
</body>
</html>
