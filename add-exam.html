    <div class="max-w-xl mx-auto px-4 pt-6 pb-16">

        <!-- Add Exam Form -->
        <div class="card shadow-xl p-6 mb-8">
            <h2 class="logo-font font-black text-blue-900 text-lg mb-6">📋 নতুন Exam Add করো</h2>

            <!-- Subject / Paper / Chapter -->

                <p class="text-xs text-gray-400 mt-2">Format: question, option1, option2, option3, option4, option5(ঐচ্ছিক), answer, explanation</p>

            <!-- Publish Button -->

                📤 Exam Publish করো

        <!-- Status Message -->
        <div id="status" class="hidden p-4 mb-5 rounded-2xl text-center font-bold text-sm"></div>

        <!-- Exams List -->
        <div>
            <div class="logo-font font-black text-gray-700 text-sm uppercase tracking-wide mb-4">সব Exam — <span id="examCount" class="text-blue-600">লোড হচ্ছে...</span></div>
            <div id="examsList" class="space-y-3"></div>
        </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="editModal">

            <div class="grid grid-cols-1 gap-4 mb-4">
                <div>
                    <label class="label">Subject</label>
                    <input type="text" id="editSubject" class="input-style">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="label">Paper</label>

                            <option value="">— নেই —</option>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="label">Title</label>

                    </div>
                    <div>
                        <label class="label">Duration (মিনিট)</label>
                        <input type="number" id="editDuration" class="input-style">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="label">Negative Mark</label>
                        <select id="editNegMark" class="input-style">
                            <option value="0">নেই</option>
                            <option value="0.25">০.২৫</option>

                    </div>
                    <div>
                        <label class="label">Description</label>

                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>

                        <input type="datetime-local" id="editStartTime" class="input-style">

            <div class="flex gap-3">

                <button onclick="closeModal()" class="flex-1 bg-gray-100 text-gray-700 py-3 rounded-xl font-black text-sm hover:bg-gray-200 transition-colors">বাতিল</button>

        </div>

    <script>
        const SUPABASE_URL = 'https://gdmhswxnlhvtyfxaevnt.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkbWhzd3hubGh2dHlmeGFldm50Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MjQyMTQsImV4cCI6MjA5MzIwMDIxNH0.0vDkuK0s6dIYWsgPmvfXXPyalpHNqkm3J--kbhck2PI';
        const atlas = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        $(document).ready(function() {
            loadMetaData();
            $('#csvFile').change(function() {
                if(this.files[0]) {
                    $('#fileName').text("✅ নির্বাচিত: " + this.files[0].name);
                    $('#fileName').addClass('text-green-700');
                }
            });

            // Paper select2
            $('#paper').select2({ minimumResultsForSearch: Infinity });
        });

        async function loadMetaData() {
            try {
                const { data, error } = await atlas.from('exams').select('subject, paper, chapter');
                if(error) throw error;

                const getUnique = (k) => [...new Set((data||[]).map(e => e[k]).filter(Boolean))];
                const subjects = getUnique('subject');
                const chapters = getUnique('chapter');

                $('.subject-suggest').select2({
                    tags: true, placeholder: 'Subject লিখো বা বেছে নাও',
                    data: subjects.map(v => ({id: v, text: v}))
                });
                $('.chapter-suggest').select2({
                    tags: true, placeholder: 'Chapter লিখো বা বেছে নাও',
                    data: chapters.map(v => ({id: v, text: v}))
                });

                renderExams();
            } catch(err) {
                console.error('Meta Load Error:', err.message);
            }
        }

        function showStatus(msg, ok) {
            const s = $('#status');
            s.removeClass('hidden bg-green-100 text-green-800 bg-red-100 text-red-800');
            s.addClass(ok ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800');
            s.text(msg).removeClass('hidden');
            setTimeout(() => s.addClass('hidden'), 4000);
        }

        // Parse CSV properly (handles quoted commas)
        function parseCSVLine(line) {
            const result = [];
            let inQuote = false, cur = '';
            for(let i = 0; i < line.length; i++) {
                const ch = line[i];
                if(ch === '"') { inQuote = !inQuote; }
                else if(ch === ',' && !inQuote) { result.push(cur.trim()); cur = ''; }
                else { cur += ch; }
            }
            result.push(cur.trim());
            return result;
        }

        async function publishExam() {
            const btn = $('#pubBtn');
            const sub = $('#subject').val();
            const chap = $('#chapter').val();
            const file = $('#csvFile')[0].files[0];

            if(!sub || !chap || !file) {
                showStatus('❌ Subject, Chapter এবং CSV ফাইল দরকার!', false);
                return;
            }

            try {
                btn.text('⏳ PROCESSING...').prop('disabled', true);

                const text = await file.text();
                const lines = text.split('\n').slice(1).filter(r => r.trim());

                const questions = lines.map(r => {
                    const c = parseCSVLine(r);
                    return {
                        question: c[0] || '',   // ← key is "question" (singular)
                        option1: c[1] || '',
                        option2: c[2] || '',
                        option3: c[3] || '',
                        option4: c[4] || '',
                        option5: c[5] || '',
                        answer: c[6] || '',
                        explanation: c[7] || '',
                        type: '1',
                        section: '1'
                    };
                }).filter(q => q.question);

                if(questions.length === 0) {
                    showStatus('❌ CSV থেকে কোনো প্রশ্ন পাওয়া যায়নি। Format চেক করো।', false);
                    btn.text('📤 Exam Publish করো').prop('disabled', false);
                    return;
                }

                const exId = Date.now().toString();
                // Always use atlasmediprep.vercel.app as origin
                const origin = 'https://atlasmediprep.vercel.app';
                const exLink = `${origin}/exam-hall.html?id=${exId}`;

                const paperVal = $('#paper').val();
                const startTimeVal = $('#startTime').val();
                const endTimeVal = $('#endTime').val();

                const insertData = {
                    exam_id: exId,
                    subject: sub,
                    paper: paperVal || null,
                    chapter: chap,
                    title: $('#title').val() || `${sub} - ${chap}`,
                    questions: questions,
                    duration: parseInt($('#duration').val()) || 20,
                    neg_mark: parseFloat($('#negMark').val()) || 0,
                    description: $('#description').val() || null,
                    exam_link: exLink,
                    start_time: startTimeVal ? new Date(startTimeVal).toISOString() : null,
                    end_time: endTimeVal ? new Date(endTimeVal).toISOString() : null,
                };

                const { error } = await atlas.from('exams').insert([insertData]);
                if(error) throw error;

                try { await navigator.clipboard.writeText(exLink); } catch(e) {}

                showStatus(`✅ ${questions.length}টি প্রশ্ন সহ Exam Published! Link Copied: ${exLink}`, true);

                // Reset form
                $('#subject').val(null).trigger('change');
                $('#chapter').val(null).trigger('change');
                $('#paper').val('').trigger('change');
                $('#title,#description').val('');
                $('#duration').val(20);
                $('#negMark').val('0.25');
                $('#startTime,#endTime').val('');
                $('#fileName').text('CSV ফাইল এখানে ড্রপ করো বা ক্লিক করো').removeClass('text-green-700');
                $('#csvFile').val('');

                renderExams();

            } catch(err) {
                showStatus('❌ Error: ' + err.message, false);
                console.error('Publish Error:', err);
            } finally {
                btn.text('📤 Exam Publish করো').prop('disabled', false);
            }
        }

        function getStatus(exam) {
            const now = new Date();
            if(exam.start_time && new Date(exam.start_time) > now) return 'upcoming';
            if(exam.end_time && new Date(exam.end_time) < now) return 'ended';
            return 'active';
        }

        async function renderExams() {
            const { data } = await atlas.from('exams').select('*').order('created_at', {ascending: false});
            const list = data || [];
            $('#examCount').text(list.length + ' টি');

            if(list.length === 0) {
                $('#examsList').html('<div class="text-center py-10 text-gray-400 font-bold">কোনো Exam নেই</div>');
                return;
            }

            $('#examsList').html(list.map(ex => {
                const status = getStatus(ex);
                const qCount = (() => { try { const q = typeof ex.questions==='string'?JSON.parse(ex.questions):ex.questions; return Array.isArray(q)?q.length:0; } catch(e){return 0;} })();
                const statusBadge = status === 'active' ? '<span class="status-badge status-active">✓ Live</span>' : status === 'upcoming' ? '<span class="status-badge status-upcoming">⏰ Upcoming</span>' : '<span class="status-badge status-ended">Ended</span>';
                return `
                <div class="exam-row">
                    <div class="flex-1 min-w-0">
                        <div class="font-black text-gray-800 text-sm truncate">${ex.title || ex.chapter || 'Exam'}</div>
                        <div class="flex gap-2 flex-wrap mt-1">
                            ${ex.subject ? `<span style="font-size:10px;font-weight:800;color:#1e40af;background:#eff6ff;border-radius:10px;padding:2px 8px;">${ex.subject}</span>` : ''}
                            ${ex.paper ? `<span style="font-size:10px;font-weight:800;color:#16a34a;background:#f0fdf4;border-radius:10px;padding:2px 8px;">${ex.paper}</span>` : ''}
                            <span style="font-size:10px;font-weight:700;color:#64748b;">${qCount}Q · ${ex.duration||20}min · -${ex.neg_mark||0}</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 flex-shrink-0">
                        ${statusBadge}
                        <button onclick="copyLink('${ex.exam_link||''}')" class="bg-blue-100 text-blue-800 text-xs font-black px-3 py-1.5 rounded-xl hover:bg-blue-200 transition-colors">Copy</button>
                        <button onclick="openEdit(${JSON.stringify(ex).replace(/"/g,'&quot;')})" class="bg-yellow-100 text-yellow-800 text-xs font-black px-3 py-1.5 rounded-xl hover:bg-yellow-200 transition-colors">Edit</button>
                        <button onclick="deleteExam('${ex.exam_id}')" class="bg-red-100 text-red-600 text-xs font-black px-3 py-1.5 rounded-xl hover:bg-red-200 transition-colors">Del</button>
                    </div>
                </div>`;
            }).join(''));
        }

        function copyLink(link) {
            if(!link) { showStatus('❌ Link পাওয়া যায়নি', false); return; }
            try { navigator.clipboard.writeText(link); } catch(e) {}
            showStatus('✅ Link Copied!', true);
        }

        function openEdit(ex) {
            $('#editExamId').val(ex.exam_id);
            $('#editSubject').val(ex.subject || '');
            $('#editPaper').val(ex.paper || '');
            $('#editChapter').val(ex.chapter || '');
            $('#editTitle').val(ex.title || '');
            $('#editDuration').val(ex.duration || 20);
            $('#editNegMark').val(ex.neg_mark || 0.25);
            $('#editDescription').val(ex.description || '');
            if(ex.start_time) $('#editStartTime').val(new Date(ex.start_time).toISOString().slice(0,16));
            else $('#editStartTime').val('');
            if(ex.end_time) $('#editEndTime').val(new Date(ex.end_time).toISOString().slice(0,16));
            else $('#editEndTime').val('');
            $('#editModal').addClass('open');
        }

        function closeModal() {
            $('#editModal').removeClass('open');
        }

        async function saveEdit() {
            const examId = $('#editExamId').val();
            const startTimeVal = $('#editStartTime').val();
            const endTimeVal = $('#editEndTime').val();

            const updates = {
                subject: $('#editSubject').val(),
                paper: $('#editPaper').val() || null,
                chapter: $('#editChapter').val(),
                title: $('#editTitle').val(),
                duration: parseInt($('#editDuration').val()) || 20,
                neg_mark: parseFloat($('#editNegMark').val()) || 0,
                description: $('#editDescription').val() || null,
                start_time: startTimeVal ? new Date(startTimeVal).toISOString() : null,
                end_time: endTimeVal ? new Date(endTimeVal).toISOString() : null,
            };

            try {
                const { error } = await atlas.from('exams').update(updates).eq('exam_id', examId);
                if(error) throw error;
                closeModal();
                showStatus('✅ Exam Updated!', true);
                renderExams();
            } catch(err) {
                showStatus('❌ Update Error: ' + err.message, false);
            }
        }

        async function deleteExam(examId) {
            if(!confirm('⚠️ এই Exam মুছে ফেলতে চাও?')) return;
            try {
                const { error } = await atlas.from('exams').delete().eq('exam_id', examId);
                if(error) throw error;
                showStatus('✅ Exam মুছে গেছে', true);
                renderExams();
            } catch(err) {
                showStatus('❌ Delete Error: ' + err.message, false);
            }
        }

        // Close modal on overlay click
        $('#editModal').on('click', function(e) {
            if(e.target === this) closeModal();
        });
    </script>
</body>
