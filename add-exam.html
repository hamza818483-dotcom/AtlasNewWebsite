<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Add Exam | ATLAS</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
  <div class="max-w-4xl mx-auto p-6">
    <h1 class="text-3xl font-bold mb-6">নতুন পরীক্ষা যোগ করুন</h1>

    <div class="bg-white p-6 rounded-xl shadow">
      <input type="file" id="csvInput" accept=".csv" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
      
      <div class="mt-6">
        <button onclick="processCSV()" 
                class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-lg font-medium">
          CSV আপলোড ও প্রসেস করুন
        </button>
      </div>

      <div id="status" class="mt-4 text-sm"></div>
      <div id="preview" class="mt-6"></div>
    </div>
  </div>

  <script>
    // ==================== CSV Parser + Validator ====================
    async function processCSV() {
      const fileInput = document.getElementById('csvInput');
      const status = document.getElementById('status');
      const preview = document.getElementById('preview');

      if (!fileInput.files.length) {
        status.innerHTML = `<span class="text-red-600">❌ CSV ফাইল সিলেক্ট করুন</span>`;
        return;
      }

      const file = fileInput.files[0];
      status.innerHTML = `<span class="text-blue-600">📤 প্রসেসিং চলছে...</span>`;

      const reader = new FileReader();
      
      reader.onload = function(e) {
        const csvText = e.target.result;
        const result = parseAndValidateCSV(csvText);
        
        if (result.errors.length > 0) {
          showErrors(result.errors);
        } else {
          saveExam(result.questions);
          showSuccess(result.questions);
        }
      };
      
      reader.readAsText(file);
    }

    // ==================== মূল পার্সিং + ভ্যালিডেশন ফাংশন ====================
    function parseAndValidateCSV(csvText) {
      const lines = csvText.trim().split('\n');
      const questions = [];
      const errors = [];

      // Header চেক
      const header = lines[0].toLowerCase().replace(/\s+/g, '');
      const expectedHeaders = ['questions', 'option1', 'option2', 'option3', 'option4', 'option5', 'answer', 'explanation', 'type', 'section'];

      if (!expectedHeaders.every(h => header.includes(h))) {
        errors.push("❌ CSV হেডার সঠিক নয়। সঠিক ফরম্যাট: questions,option1,option2,option3,option4,option5,answer,explanation,type,section");
      }

      for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;

        const row = parseCSVLine(lines[i]); // স্মার্ট CSV লাইন পার্সার
        const qNum = i;

        // Required field validation
        if (!row[0] || row[0].trim() === '') {
          errors.push(`Row ${qNum}: প্রশ্ন খালি`);
          continue;
        }

        const answer = parseInt(row[6]);
        if (isNaN(answer) || answer < 1 || answer > 5) {
          errors.push(`Row ${qNum}: Answer সঠিক নয় (শুধু 1-5 এর মধ্যে নম্বর দিন)`);
        }

        // Option validation
        const options = [];
        for (let j = 1; j <= 5; j++) {
          if (row[j] && row[j].trim() !== '') {
            options.push(row[j].trim());
          }
        }

        if (options.length < 2) {
          errors.push(`Row ${qNum}: কমপক্ষে ২টি অপশন থাকতে হবে`);
        }

        if (answer > options.length) {
          errors.push(`Row \( {qNum}: Answer ( \){answer}) অপশনের সংখ্যার চেয়ে বড়`);
        }

        questions.push({
          id: Date.now() + i,
          question: row[0].trim(),
          options: options,
          answer: answer,
          explanation: row[7] ? row[7].trim() : "",
          type: row[8] ? parseInt(row[8]) : 1,
          section: row[9] ? row[9].trim() : "General"
        });
      }

      return { questions, errors };
    }

    // ==================== স্মার্ট CSV লাইন পার্সার (কমা হ্যান্ডেল করে) ====================
    function parseCSVLine(line) {
      const result = [];
      let current = '';
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        
        if (char === '"' ) {
          inQuotes = !inQuotes;
        } else if (char === ',' && !inQuotes) {
          result.push(current.trim());
          current = '';
        } else {
          current += char;
        }
      }
      result.push(current.trim());
      return result;
    }

    // ==================== সেভ + সাকসেস মেসেজ ====================
    function saveExam(questions) {
      let allExams = JSON.parse(localStorage.getItem('atlas_exams') || '[]');
      
      const newExam = {
        examId: 'exam_' + Date.now(),
        title: "New Exam " + new Date().toLocaleDateString('bn-BD'),
        questions: questions,
        createdAt: new Date().toISOString(),
        startTime: null,
        endTime: null,
        negativeMarking: false,
        negativeValue: 0
      };

      allExams.push(newExam);
      localStorage.setItem('atlas_exams', JSON.stringify(allExams));
    }

    function showSuccess(questions) {
      const status = document.getElementById('status');
      const preview = document.getElementById('preview');

      const link = `\( {window.location.origin}/exam/exam-hall.html?examId= \){Date.now()}`;

      status.innerHTML = `
        <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded">
          ✅ <strong>সফলভাবে আপলোড হয়েছে!</strong> ${questions.length} টি প্রশ্ন
        </div>
      `;

      preview.innerHTML = `
        <p class="font-medium">ইউনিক এক্সাম লিংক:</p>
        <div class="flex gap-2 mt-2">
          <input type="text" value="${link}" readonly class="flex-1 bg-gray-100 p-3 rounded border">
          <button onclick="copyLink('${link}')" class="bg-blue-600 text-white px-6 rounded">কপি</button>
        </div>
      `;
    }

    function copyLink(link) {
      navigator.clipboard.writeText(link);
      alert("✅ লিংক কপি হয়েছে!");
    }

    function showErrors(errors) {
      let html = `<div class="bg-red-100 border border-red-400 text-red-700 p-4 rounded">`;
      html += `<strong>${errors.length} টি সমস্যা পাওয়া গেছে:</strong><ul class="list-disc pl-5 mt-2">`;
      errors.forEach(err => html += `<li>${err}</li>`);
      html += `</ul></div>`;
      
      document.getElementById('status').innerHTML = html;
    }
  </script>
</body>
</html>
