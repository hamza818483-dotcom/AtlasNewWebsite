<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS - Premium Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background: #f8fafc; }
        .select2-container--default .select2-selection--single { height: 45px; border-radius: 12px; border: 1px solid #e2e8f0; padding-top: 8px; font-weight: 600; }
        .input-style { width: 100%; padding: 12px; background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; font-weight: 600; outline: none; transition: 0.3s; }
        .input-style:focus { border-color: #1e40af; box-shadow: 0 0 0 4px rgba(30,64,175,0.05); }
    </style>
</head>
<body class="pb-20">
    <div class="container mx-auto p-4 md:p-8">
        <h1 class="text-3xl font-black mb-8 text-center text-blue-900 italic uppercase tracking-wider">📋 ATLAS Admin Control</h1>
        
        <div class="bg-white rounded-[2.5rem] shadow-xl p-6 md:p-10 border border-gray-100 mb-10">
            <h2 class="text-xl font-black mb-8 flex items-center text-gray-800">
                <span class="bg-blue-100 p-2 rounded-xl mr-4 text-blue-600">➕</span> Create Smart Exam
            </h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 mb-8">
                <div><label class="text-[10px] font-black text-gray-400 uppercase ml-2 mb-2 block">Subject *</label><select id="subject" class="subject-suggest w-full"></select></div>
                <div><label class="text-[10px] font-black text-gray-400 uppercase ml-2 mb-2 block">Paper *</label><select id="paper" class="paper-suggest w-full"></select></div>
                <div><label class="text-[10px] font-black text-gray-400 uppercase ml-2 mb-2 block">Chapter *</label><select id="chapter" class="chapter-suggest w-full"></select></div>
                <div><label class="text-[10px] font-black text-gray-400 uppercase ml-2 mb-2 block">Exam Title</label><input type="text" id="title" class="input-style" placeholder="e.g. Weekly Quiz"></div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-8">
                <div class="bg-blue-50/50 p-4 rounded-2xl border border-blue-50">
                    <label class="text-[9px] font-black text-blue-800 uppercase block mb-2">Start Timeline</label>
                    <input type="datetime-local" id="startTime" class="input-style text-xs">
                </div>
                <div class="bg-blue-50/50 p-4 rounded-2xl border border-blue-50">
                    <label class="text-[9px] font-black text-blue-800 uppercase block mb-2">End Timeline</label>
                    <input type="datetime-local" id="endTime" class="input-style text-xs">
                </div>
                <div class="bg-blue-50/50 p-4 rounded-2xl border border-blue-50">
                    <label class="text-[9px] font-black text-blue-800 uppercase block mb-2">Duration (Min)</label>
                    <input type="number" id="duration" class="input-style font-black text-center" value="20">
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-10">
                <div class="bg-red-50 p-5 rounded-2xl border border-red-100 flex items-center justify-between">
                    <div>
                        <p class="text-[10px] font-black text-red-600 uppercase mb-1">Negative Marking</p>
                        <div class="flex gap-4">
                            <label class="font-bold text-sm"><input type="radio" name="neg" value="on" class="mr-1"> ON</label>
                            <label class="font-bold text-sm"><input type="radio" name="neg" value="off" checked class="mr-1"> OFF</label>
                        </div>
                    </div>
                    <input type="number" id="negVal" class="w-20 bg-white border rounded-xl p-2 text-center font-bold text-red-600" value="0.25" step="0.25">
                </div>
                
                <div class="flex gap-3">
                    <button onclick="showInp('csv')" id="btn-csv" class="flex-1 bg-blue-600 text-white font-black uppercase text-[10px] tracking-widest rounded-2xl shadow-lg shadow-blue-200">📁 CSV Upload</button>
                    <button onclick="showInp('link')" id="btn-link" class="flex-1 bg-white border text-gray-400 font-black uppercase text-[10px] tracking-widest rounded-2xl">🔗 External Link</button>
                </div>
            </div>

            <div id="csvBox" class="border-4 border-dashed border-blue-100 p-12 rounded-[3rem] text-center bg-gray-50/50 mb-10 relative">
                <input type="file" id="csvFile" accept=".csv" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onchange="updateLabel(this)">
                <div class="text-4xl mb-4">📥</div>
                <p id="fileName" class="font-black text-blue-900">Drop your CSV here or Tap to browse</p>
                <p class="text-[9px] text-gray-400 mt-2 uppercase">10 Columns: question, opt1-4, opt5, ans(1-5), exp, type, sec</p>
            </div>
            
            <div id="linkBox" class="hidden mb-10"><input type="url" id="extUrl" class="input-style p-5 text-center" placeholder="https://external-exam-link.com"></div>
            
            <button onclick="publish()" id="pubBtn" class="w-full bg-blue-900 text-white py-6 rounded-[2.5rem] font-black uppercase tracking-[2px] shadow-2xl active:scale-95 transition-all">Publish & Get Secret Link</button>
        </div>
        
        <div class="bg-white rounded-[2.5rem] shadow-lg p-8 border border-gray-100">
            <h2 class="text-xl font-black mb-8 flex items-center text-gray-800"><span class="bg-green-100 p-2 rounded-xl mr-4 text-green-600">📋</span> Manage Exams</h2>
            <div id="examsList" class="space-y-4"></div>
        </div>
    </div>
    
    <script>
        const SUPABASE_URL = 'https://gdmhswxnlhvtyfxaevnt.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkbWhzd3hubGh2dHlmeGFldm50Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MjQyMTQsImV4cCI6MjA5MzIwMDIxNH0.0vDkuK0s6dIYWsgPmvfXXPyalpHNqkm3J--kbhck2PI';
        const atlas = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let method = 'csv';
        $(document).ready(() => loadMeta());

        function showInp(m) {
            method = m;
            $('#csvBox').toggleClass('hidden', m !== 'csv'); $('#linkBox').toggleClass('hidden', m !== 'link');
            $('#btn-csv').toggleClass('bg-blue-600 text-white shadow-lg', m === 'csv').toggleClass('bg-white text-gray-400', m !== 'csv');
            $('#btn-link').toggleClass('bg-green-600 text-white shadow-lg', m === 'link').toggleClass('bg-white text-gray-400', m !== 'link');
        }

        function updateLabel(input) { if(input.files[0]) $('#fileName').text("File: " + input.files[0].name); }

        async function loadMeta() {
            const { data } = await atlas.from('exams').select('subject, paper, chapter');
            const getU = (k) => [...new Set((data||[]).map(e=>e[k]).filter(Boolean))];
            $('.subject-suggest').select2({tags:true, data:getU('subject').map(v=>({id:v, text:v}))});
            $('.paper-suggest').select2({tags:true, data:getU('paper').map(v=>({id:v, text:v}))});
            $('.chapter-suggest').select2({tags:true, data:getU('chapter').map(v=>({id:v, text:v}))});
            renderList();
        }

        async function publish() {
            const btn = $('#pubBtn');
            const sub = $('#subject').val(), chap = $('#chapter').val();
            if(!sub || !chap) return alert('Subject & Chapter are mandatory!');
            
            btn.text("GENERATING...").prop('disabled', true);
            let qs = [];

            if(method === 'csv') {
                const file = $('#csvFile')[0].files[0];
                if(!file) { btn.text("Publish").prop('disabled', false); return alert('Upload CSV!'); }
                const text = await file.text();
                const rows = text.split('\n').slice(1).filter(r => r.trim());
                qs = rows.map(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(col => col.replace(/^"|"$/g, '').trim());
                    return { questions: c[0], option1: c[1], option2: c[2], option3: c[3], option4: c[4], option5: c[5]||"", answer: c[6], explanation: c[7], type: "1", section: "1" };
                });
                alert("Upload Successfully!");
            }

            const exId = Date.now().toString();
            const exLink = `${window.location.origin}/exam-hall.html?id=${exId}`;
            
            const { error } = await atlas.from('exams').insert([{
                exam_id: exId, subject: sub, paper: $('#paper').val(), chapter: chap,
                title: $('#title').val() || `${sub} - ${chap}`, questions: qs,
                start_time: $('#startTime').val(), end_time: $('#endTime').val(),
                negative_marking: $('input[name="neg"]:checked').val() === 'on',
                negative_value: parseFloat($('#negVal').val()), duration: $('#duration').val(),
                exam_link: exLink, type: method, external_link: $('#extUrl').val()
            }]);

            if(!error) {
                navigator.clipboard.writeText(exLink);
                alert("🚀 Exam Live!\nUnique Link Copied to Clipboard.");
                location.reload();
            } else { alert(error.message); btn.text("Publish").prop('disabled', false); }
        }

        async function renderList() {
            const { data } = await atlas.from('exams').select('*').order('created_at', {ascending: false});
            $('#examsList').html(data.map(ex => `
                <div class="bg-gray-50 p-5 rounded-[2rem] flex justify-between items-center border border-gray-100">
                    <div><p class="font-black text-blue-900 text-sm">${ex.subject}: ${ex.chapter}</p><p class="text-[9px] text-gray-400 font-bold uppercase">${ex.type}</p></div>
                    <div class="flex gap-2">
                        <button onclick="copyL('${ex.exam_link}')" class="bg-blue-100 text-blue-700 px-4 py-2 rounded-full text-[10px] font-black uppercase">Link</button>
                        <button onclick="del('${ex.exam_id}')" class="text-red-500 font-bold text-xs">Delete</button>
                    </div>
                </div>`).join(''));
        }
        window.copyL = (l) => { navigator.clipboard.writeText(l); alert('Copied!'); }
        window.del = async (id) => { if(confirm('Delete?')) { await atlas.from('exams').delete().eq('exam_id', id); renderList(); } }
    </script>
</body>
</html>
