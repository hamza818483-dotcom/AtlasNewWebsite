<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS - Admin Panel</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background: #f8fafc; }
        .input-style { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; font-weight: 600; outline: none; }
    </style>
</head>
<body class="pb-20">
    <div class="container mx-auto p-4 md:p-8">
        <h1 class="text-3xl font-black mb-8 text-center text-blue-900">📋 ATLAS ADMIN PANEL</h1>
        
        <div class="bg-white rounded-[2rem] shadow-xl p-6 border border-gray-100 mb-10">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-8">
                <div><label class="text-[10px] font-black text-gray-400 uppercase mb-2 block">Subject *</label><select id="subject" class="subject-suggest w-full"></select></div>
                <div><label class="text-[10px] font-black text-gray-400 uppercase mb-2 block">Paper *</label><select id="paper" class="paper-suggest w-full"></select></div>
                <div><label class="text-[10px] font-black text-gray-400 uppercase mb-2 block">Chapter *</label><select id="chapter" class="chapter-suggest w-full"></select></div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-8">
                <input type="text" id="title" class="input-style" placeholder="Exam Title">
                <input type="number" id="duration" class="input-style" value="20" placeholder="Duration (Min)">
            </div>

            <div class="border-4 border-dashed border-blue-100 p-10 rounded-[2rem] text-center bg-blue-50/30 relative mb-8">
                <input type="file" id="csvFile" accept=".csv" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                <p id="fileName" class="font-black text-blue-900 italic">Click or Drop CSV File Here</p>
            </div>
            
            <button onclick="publishExam()" id="pubBtn" class="w-full bg-blue-900 text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl">Publish Exam</button>
        </div>

        <div id="status" class="hidden p-4 mb-4 rounded-xl text-center font-bold"></div>
        <div id="examsList" class="space-y-4"></div>
    </div>
    
    <script>
        const SUPABASE_URL = 'https://gdmhswxnlhvtyfxaevnt.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkbWhzd3hubGh2dHlmeGFldm50Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MjQyMTQsImV4cCI6MjA5MzIwMDIxNH0.0vDkuK0s6dIYWsgPmvfXXPyalpHNqkm3J--kbhck2PI';
        
        // Connect Supabase
        const atlas = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        $(document).ready(function() {
            console.log("Admin Panel Ready");
            loadMetaData();
            
            $('#csvFile').change(function() {
                if(this.files[0]) $('#fileName').text("File Selected: " + this.files[0].name);
            });
        });

        async function loadMetaData() {
            try {
                const { data, error } = await atlas.from('exams').select('subject, paper, chapter');
                if(error) throw error;
                
                const getU = (k) => [...new Set((data||[]).map(e=>e[k]).filter(Boolean))];
                $('.subject-suggest').select2({tags:true, data:getU('subject').map(v=>({id:v, text:v}))});
                $('.paper-suggest').select2({tags:true, data:getU('paper').map(v=>({id:v, text:v}))});
                $('.chapter-suggest').select2({tags:true, data:getU('chapter').map(v=>({id:v, text:v}))});
                renderExams();
            } catch (err) {
                console.error("Meta Load Error:", err.message);
            }
        }

        async function publishExam() {
            const btn = $('#pubBtn');
            const sub = $('#subject').val();
            const chap = $('#chapter').val();
            const file = $('#csvFile')[0].files[0];

            if(!sub || !chap || !file) {
                alert("Subject, Chapter abong CSV file dorkar!");
                return;
            }

            try {
                btn.text("PROCESSING...").prop('disabled', true);
                
                const text = await file.text();
                const rows = text.split('\n').slice(1).filter(r => r.trim());
                
                const questions = rows.map(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(col => col.replace(/^"|"$/g, '').trim());
                    return { 
                        questions: c[0], option1: c[1], option2: c[2], option3: c[3], option4: c[4], 
                        option5: c[5]||"", answer: c[6], explanation: c[7], type: "1", section: "1" 
                    };
                });

                const exId = Date.now().toString();
                const exLink = `${window.location.origin}/exam-hall.html?id=${exId}`;
                
                const { error } = await atlas.from('exams').insert([{
                    exam_id: exId, subject: sub, paper: $('#paper').val(), chapter: chap,
                    title: $('#title').val() || `${sub} - ${chap}`, questions: questions,
                    duration: $('#duration').val(), exam_link: exLink
                }]);

                if(error) throw error;

                navigator.clipboard.writeText(exLink);
                alert("✅ Success! Link Copied: " + exLink);
                location.reload();

            } catch (err) {
                alert("Error: " + err.message);
                console.error("Publish Error:", err);
                btn.text("Publish Exam").prop('disabled', false);
            }
        }

        async function renderExams() {
            const { data } = await atlas.from('exams').select('*').order('created_at', {ascending: false});
            if(data) {
                $('#examsList').html(data.map(ex => `
                    <div class="bg-gray-50 p-4 rounded-2xl flex justify-between items-center border border-gray-100 shadow-sm">
                        <div><p class="font-bold text-blue-900">${ex.subject}: ${ex.chapter}</p></div>
                        <div class="flex gap-2">
                            <button onclick="copyL('${ex.exam_link}')" class="bg-blue-900 text-white px-3 py-1 rounded-lg text-xs">Copy Link</button>
                            <button onclick="delEx('${ex.exam_id}')" class="text-red-500 text-xs font-bold">Delete</button>
                        </div>
                    </div>`).join(''));
            }
        }
        window.copyL = (l) => { navigator.clipboard.writeText(l); alert('Copied!'); }
        window.delEx = async (id) => { if(confirm('Delete?')) { await atlas.from('exams').delete().eq('exam_id', id); renderExams(); } }
    </script>
</body>
</html>
