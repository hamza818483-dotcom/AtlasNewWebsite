<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS | Advanced Exam Creator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background: #f0f4f8; }
        .input-box { width: 100%; padding: 14px; background: #fff; border-radius: 16px; border: 1px solid #e2e8f0; font-weight: bold; font-size: 13px; outline: none; transition: 0.3s; }
        .input-box:focus { border-color: #1e40af; box-shadow: 0 0 0 3px rgba(30,64,175,0.1); }
        .btn-active { background-color: #1e40af !important; color: white !important; }
    </style>
</head>
<body class="pb-20">
    <nav class="bg-white p-5 shadow-sm flex items-center space-x-3 sticky top-0 z-50">
        <button onclick="window.location.href='admin.html'" class="bg-gray-100 px-4 py-2 rounded-xl text-blue-800 font-bold">❮</button>
        <span class="font-black text-blue-900 uppercase italic text-lg">Smart Exam Creator</span>
    </nav>

    <div class="p-6 max-w-2xl mx-auto">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-xl">
            <h2 class="text-xl font-black text-blue-900 mb-6 uppercase italic">⚙️ Exam Settings</h2>
            
            <div class="space-y-3 mb-5">
                <input list="subList" id="exSubject" placeholder="Subject (যেমন: Biology)" class="input-box">
                <datalist id="subList"></datalist>
                <div class="grid grid-cols-2 gap-3">
                    <input list="papList" id="exPaper" placeholder="Paper (e.g. 1st Paper)" class="input-box">
                    <datalist id="papList"></datalist>
                    <input list="chapList" id="exChapter" placeholder="Chapter (যেমন: কোষ ও এর গঠন)" class="input-box">
                    <datalist id="chapList"></datalist>
                </div>
                <textarea id="exDesc" placeholder="Exam Description..." class="input-box h-20 resize-none"></textarea>
            </div>

            <div class="bg-blue-50 p-4 rounded-[1.5rem] border mb-5">
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="text-[9px] font-bold text-blue-800">START DATE & TIME</label><input type="datetime-local" id="exStart" class="input-box text-xs mt-1"></div>
                    <div><label class="text-[9px] font-bold text-blue-800">END DATE & TIME</label><input type="datetime-local" id="exEnd" class="input-box text-xs mt-1"></div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="border p-3 rounded-[1.5rem] bg-gray-50 flex flex-col justify-center">
                    <label class="flex items-center justify-between text-[10px] font-black text-red-600 uppercase">Neg Mark <input type="checkbox" id="negToggle" onchange="document.getElementById('negVal').classList.toggle('hidden', !this.checked)"></label>
                    <input type="number" id="negVal" value="0.25" step="0.01" class="w-full mt-2 border-b bg-transparent text-center font-bold text-red-600 hidden outline-none">
                </div>
                <input type="number" id="exDur" placeholder="Duration (Min)" class="input-box text-center text-lg">
            </div>

            <div class="flex space-x-2 mb-5">
                <button onclick="setMode('csv', this)" id="csvBtn" class="mode-btn btn-active flex-1 py-3 rounded-2xl font-black text-xs border">CSV Upload</button>
                <button onclick="setMode('link', this)" id="linkBtn" class="mode-btn bg-white text-gray-400 flex-1 py-3 rounded-2xl font-black text-xs border">External Link</button>
            </div>

            <div id="csvArea" class="border-2 border-dashed border-blue-200 p-8 rounded-[2rem] text-center bg-blue-50/50 relative mb-6">
                <input type="file" id="csvFile" accept=".csv" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                <p id="fileName" class="text-xs font-black text-blue-900">Upload CSV (question, opt1-4, opt5, answer, exp, type, sec)</p>
            </div>
            <div id="linkArea" class="hidden mb-6"><input type="url" id="exLink" placeholder="Paste External Link" class="input-box"></div>

            <button onclick="publishExam()" id="pubBtn" class="w-full bg-blue-900 text-white py-5 rounded-[2rem] font-black uppercase shadow-xl tracking-widest active:scale-95 transition">Publish & Copy Link</button>
        </div>

        <div class="mt-10" id="savedExamsArea">
            <h3 class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-4 mb-4">Manage Exams</h3>
            <div id="examList" class="space-y-3"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://gdmhswxnlhvtyfxaevnt.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkbWhzd3hubGh2dHlmeGFldm50Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MjQyMTQsImV4cCI6MjA5MzIwMDIxNH0.0vDkuK0s6dIYWsgPmvfXXPyalpHNqkm3J--kbhck2PI';
        const atlas = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let mode = 'csv';

        window.onload = loadData;

        function setMode(m, btn) {
            mode = m;
            document.querySelectorAll('.mode-btn').forEach(b => { b.classList.remove('btn-active'); b.classList.add('bg-white', 'text-gray-400'); });
            btn.classList.add('btn-active'); btn.classList.remove('bg-white', 'text-gray-400');
            document.getElementById('csvArea').classList.toggle('hidden', m !== 'csv');
            document.getElementById('linkArea').classList.toggle('hidden', m !== 'link');
        }

        document.getElementById('csvFile').addEventListener('change', e => { if(e.target.files[0]) document.getElementById('fileName').innerText = e.target.files[0].name; });

        async function publishExam() {
            const btn = document.getElementById('pubBtn');
            const subject = document.getElementById('exSubject').value;
            const chapter = document.getElementById('exChapter').value;
            
            if(!subject || !chapter) return alert("Subject এবং Chapter অবশ্যই দিতে হবে!");

            btn.innerText = "UPLOADING..."; btn.disabled = true;
            let questions = [];

            if(mode === 'csv') {
                const file = document.getElementById('csvFile').files[0];
                if(!file) { alert("CSV ফাইল সিলেক্ট করো!"); btn.innerText = "Publish Exam"; btn.disabled = false; return; }
                
                const text = await file.text();
                const rows = text.split('\n').slice(1).filter(r => r.trim());
                questions = rows.map(line => {
                    const c = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(col => col.replace(/^"|"$/g, '').trim());
                    return { 
                        questions: c[0], option1: c[1], option2: c[2], option3: c[3], option4: c[4], 
                        option5: c[5] || "", answer: c[6], explanation: c[7], type: "1", section: "1" 
                    };
                });
                alert("✅ Upload Successfully!");
            }

            const examId = Date.now().toString(); // ইউনিক আইডি
            const { data, error } = await atlas.from('exams').insert([{
                exam_id: examId,
                subject: subject, 
                paper: document.getElementById('exPaper').value, 
                chapter: chapter,
                description: document.getElementById('exDesc').value, 
                start_time: document.getElementById('exStart').value, 
                end_time: document.getElementById('exEnd').value,
                duration: document.getElementById('exDur').value, 
                neg_mark: document.getElementById('negToggle').checked ? parseFloat(document.getElementById('negVal').value) : 0,
                negative_marking: document.getElementById('negToggle').checked,
                negative_value: parseFloat(document.getElementById('negVal').value),
                questions: questions, 
                type: mode, 
                external_link: document.getElementById('exLink').value
            }]).select();

            if(!error && data) {
                // সরাসরি exam-hall.html এ নিয়ে যাওয়ার লিঙ্ক
                const finalLink = window.location.origin + "/exam-hall.html?id=" + examId;
                
                navigator.clipboard.writeText(finalLink).then(() => {
                    alert("🚀 Exam Link Created & Copied to Clipboard:\n" + finalLink);
                    location.reload();
                }).catch(() => {
                    prompt("Exam Published! Copy this link:", finalLink);
                    location.reload();
                });
            } else { 
                alert("Error: " + error.message); 
                btn.innerText = "Publish Exam"; btn.disabled = false; 
            }
        }

        async function loadData() {
            const { data } = await atlas.from('exams').select('*').order('created_at', {ascending: false});
            if(data) {
                // ড্রপডাউন সাজেশন লোড
                const subs = [...new Set(data.map(d => d.subject).filter(Boolean))];
                document.getElementById('subList').innerHTML = subs.map(s => `<option value="${s}">`).join('');

                // লিস্ট রেন্ডার
                document.getElementById('examList').innerHTML = data.map(ex => `
                    <div class="bg-white p-5 rounded-[2rem] shadow-sm flex justify-between items-center border border-gray-50">
                        <div><p class="font-black text-blue-900 text-sm">${ex.subject}: ${ex.chapter}</p><p class="text-[9px] text-gray-400 font-bold uppercase">${ex.type}</p></div>
                        <button onclick="copyL('${ex.exam_id}')" class="bg-blue-900 text-white px-4 py-2 rounded-full text-[10px] font-black uppercase">Link</button>
                    </div>
                `).join('');
            }
        }

        function copyL(id) {
            const link = window.location.origin + "/exam-hall.html?id=" + id;
            navigator.clipboard.writeText(link).then(() => alert("Link Copied!"));
        }
    </script>
</body>
</html>
