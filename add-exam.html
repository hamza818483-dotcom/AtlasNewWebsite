<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS | Exam Creator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background: #f0f4f8; }
        .input-box { width: 100%; padding: 14px; background: #fff; border-radius: 16px; border: 1px solid #e2e8f0; font-weight: bold; font-size: 13px; outline: none; }
        .btn-active { background-color: #1e40af !important; color: white !important; }
    </style>
</head>
<body class="pb-20">
    <nav class="bg-white p-5 shadow-sm flex items-center space-x-3 sticky top-0 z-50">
        <button onclick="window.location.href='admin.html'" class="bg-gray-100 px-4 py-2 rounded-xl text-blue-800 font-bold">❮</button>
        <span class="font-black text-blue-900 uppercase italic text-lg">Smart Exam Creator</span>
    </nav>

    <div class="p-6 max-w-2xl mx-auto">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-xl">
            <h2 class="text-xl font-black text-blue-900 mb-6 uppercase italic">⚙️ Exam Settings</h2>
            
            <div class="space-y-3 mb-5">
                <input list="subList" id="exSubject" placeholder="Subject (যেমন: Biology)" class="input-box">
                <datalist id="subList"></datalist>
                <div class="grid grid-cols-2 gap-3">
                    <input list="papList" id="exPaper" placeholder="Paper (e.g. 1st Paper)" class="input-box">
                    <datalist id="papList"></datalist>
                    <input list="chapList" id="exChapter" placeholder="Chapter (যেমন: কোষ ও এর গঠন)" class="input-box">
                    <datalist id="chapList"></datalist>
                </div>
                <textarea id="exDesc" placeholder="Exam Description..." class="input-box h-20 resize-none"></textarea>
            </div>

            <div class="bg-blue-50 p-4 rounded-[1.5rem] border mb-5">
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="text-[9px] font-bold text-blue-800">START DATE & TIME</label><input type="datetime-local" id="exStart" class="input-box text-xs mt-1"></div>
                    <div><label class="text-[9px] font-bold text-blue-800">END DATE & TIME</label><input type="datetime-local" id="exEnd" class="input-box text-xs mt-1"></div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="border p-3 rounded-[1.5rem] bg-gray-50">
                    <label class="flex items-center justify-between text-[10px] font-black text-red-600 uppercase">Neg Mark <input type="checkbox" id="negToggle" onchange="document.getElementById('negVal').classList.toggle('hidden', !this.checked)"></label>
                    <input type="number" id="negVal" value="0.25" step="0.01" class="w-full mt-1 border-b bg-transparent text-center font-bold hidden outline-none">
                </div>
                <input type="number" id="exDur" placeholder="Duration (Min)" class="input-box text-center text-lg">
            </div>

            <div id="csvArea" class="border-2 border-dashed border-blue-200 p-8 rounded-[2rem] text-center bg-blue-50/50 relative mb-6">
                <input type="file" id="csvFile" accept=".csv" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                <p id="fileName" class="text-xs font-black text-blue-900">Upload CSV (10 Columns, Ans: 1-4)</p>
            </div>

            <button onclick="publishExam()" id="pubBtn" class="w-full bg-blue-900 text-white py-5 rounded-[2rem] font-black uppercase shadow-xl">Publish & Get Link</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://gdmhswxnlhvtyfxaevnt.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkbWhzd3hubGh2dHlmeGFldm50Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MjQyMTQsImV4cCI6MjA5MzIwMDIxNH0.0vDkuK0s6dIYWsgPmvfXXPyalpHNqkm3J--kbhck2PI';
        const atlas = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function publishExam() {
            const btn = document.getElementById('pubBtn');
            const file = document.getElementById('csvFile').files[0];
            if(!file) return alert("CSV ফাইল দাও!");
            btn.innerText = "UPLOADING..."; btn.disabled = true;

            const reader = new FileReader();
            reader.onload = async (e) => {
                const rows = e.target.result.split('\n').slice(1).filter(r => r.trim());
                const questions = rows.map(line => {
                    const c = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(col => col.replace(/^"|"$/g, '').trim());
                    return { 
                        question: c[0], option1: c[1], option2: c[2], option3: c[3], option4: c[4], 
                        option5: c[5], answer: c[6], explanation: c[7], type: "1", section: "1" 
                    };
                });

                const { data, error } = await atlas.from('exams').insert([{
                    subject: exSubject.value, paper: exPaper.value, chapter: exChapter.value,
                    description: exDesc.value, start_time: exStart.value, end_time: exEnd.value,
                    duration: exDur.value, neg_mark: negToggle.checked ? parseFloat(negVal.value) : 0,
                    questions: questions, type: 'csv'
                }]).select();

                if(!error) {
                    alert("Upload Successfully!");
                    navigator.clipboard.writeText(window.location.origin + "/exam-hall.html?id=" + data[0].id);
                    location.reload();
                } else { alert(error.message); btn.innerText = "Publish"; btn.disabled = false; }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
