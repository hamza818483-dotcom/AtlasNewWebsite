<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS | Reviews</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Sora:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background: #f0f4f8; }
        .logo-font { font-family: 'Sora', sans-serif; }
        .filter-btn { padding: 8px 18px; border-radius: 50px; font-size: 11px; font-weight: 800; border: 2px solid #e2e8f0; background: white; color: #64748b; cursor: pointer; white-space: nowrap; transition: 0.2s; letter-spacing: 0.05em; text-transform: uppercase; }
        .filter-btn.active { background: #1e40af; color: white; border-color: #1e40af; }
        .filter-btn:hover:not(.active) { border-color: #bfdbfe; color: #1e40af; }
        .review-card { background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 2px 16px rgba(0,0,0,0.06); border: 1.5px solid #f1f5f9; transition: 0.2s; }
        .review-card:hover { box-shadow: 0 8px 30px rgba(30,64,175,0.1); border-color: #bfdbfe; }
        .category-badge { display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; }
        .cat-Class { background: #eff6ff; color: #1e40af; }
        .cat-Exam { background: #f0fdf4; color: #16a34a; }
        .cat-Mentoring { background: #fdf4ff; color: #7c3aed; }
        .cat-Service { background: #fff7ed; color: #c2410c; }
        .avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 16px; color: white; flex-shrink: 0; }
        .review-img { width: 100%; display: block; max-height: 420px; object-fit: cover; }
        .star-display { color: #fbbf24; font-size: 14px; letter-spacing: 1px; }
        .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 16px; }
        .lightbox.open { display: flex; }
        .lightbox img { max-width: 100%; max-height: 90vh; border-radius: 16px; object-fit: contain; }
        .scroll-hidden::-webkit-scrollbar { display: none; }
        .empty-state { text-align: center; padding: 60px 20px; color: #94a3b8; }
    </style>
</head>
<body class="pb-10">

    <!-- Navbar -->
    <nav class="bg-white px-5 py-4 flex items-center gap-3 sticky top-0 z-50" style="box-shadow:0 2px 20px rgba(0,0,0,0.07)">
        <a href="index.html">
            <img src="https://i.ibb.co/Vv99z9W/atlas-logo.png" alt="ATLAS" class="w-8 h-8 object-contain" onerror="this.style.display='none'">
        </a>
        <div>
            <div class="logo-font font-black text-blue-900 text-base">All Reviews</div>
            <div class="text-[10px] text-gray-400 font-bold uppercase tracking-wide">স্টুডেন্টদের মতামত</div>
        </div>
        <div class="ml-auto">
            <span id="reviewCount" class="text-xs font-bold text-blue-600 bg-blue-50 px-3 py-1.5 rounded-xl"></span>
        </div>
    </nav>

    <!-- Category Filters -->
    <div class="bg-white border-b border-gray-100 sticky top-[72px] z-40">
        <div class="flex gap-2 px-4 py-3 overflow-x-auto scroll-hidden">
            <button class="filter-btn active" onclick="filterReviews('All', this)">🌟 All</button>
            <button class="filter-btn" onclick="filterReviews('Class', this)">📺 Class</button>
            <button class="filter-btn" onclick="filterReviews('Exam', this)">📝 Exam</button>
            <button class="filter-btn" onclick="filterReviews('Mentoring', this)">🎯 Mentoring</button>
            <button class="filter-btn" onclick="filterReviews('Service', this)">🎓 Course</button>
        </div>
    </div>

    <!-- Review Container -->
    <div class="max-w-xl mx-auto px-4 pt-5 pb-16">
        <div id="reviewContainer" class="space-y-5">
            <div class="empty-state">
                <div class="text-4xl mb-3 animate-pulse">⭐</div>
                <p class="font-bold text-gray-400">লোড হচ্ছে...</p>
            </div>
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <img id="lightboxImg" src="" alt="Review Photo">
    </div>

    <script>
        const SUPABASE_URL = 'https://gdmhswxnlhvtyfxaevnt.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkbWhzd3hubGh2dHlmeGFldm50Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MjQyMTQsImV4cCI6MjA5MzIwMDIxNH0.0vDkuK0s6dIYWsgPmvfXXPyalpHNqkm3J--kbhck2PI';
        const atlas = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allReviews = [];

        const avatarColors = ['#1e40af','#7c3aed','#16a34a','#dc2626','#c2410c','#0891b2'];
        const getColor = (name) => avatarColors[(name||'A').charCodeAt(0) % avatarColors.length];

        window.onload = async () => {
            const { data, error } = await atlas.from('reviews').select('*').order('created_at', { ascending: false });
            if(data) {
                allReviews = data;
                displayReviews(allReviews);
            }
        };

        function starHTML(rating) {
            if(!rating) return '';
            const r = Math.round(rating);
            return '<div class="star-display">' + '★'.repeat(r) + '☆'.repeat(5-r) + '</div>';
        }

        function displayReviews(reviews) {
            const container = document.getElementById('reviewContainer');
            document.getElementById('reviewCount').textContent = reviews.length + ' টি Review';

            if(reviews.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="text-4xl mb-3">🔍</div><p class="font-bold">কোনো রিভিউ পাওয়া যায়নি</p></div>';
                return;
            }

            container.innerHTML = reviews.map(rev => {
                const initial = (rev.student_name || 'A')[0].toUpperCase();
                const color = getColor(rev.student_name);
                const catClass = 'cat-' + (rev.category || 'Class');
                const hasImage = rev.photo_url && rev.photo_url.trim() !== '';

                return `
                <div class="review-card">
                    <!-- Header -->
                    <div class="p-5 flex items-center gap-3">
                        <div class="avatar" style="background:${color}">${initial}</div>
                        <div class="flex-1 min-w-0">
                            <div class="font-black text-gray-900 text-sm">${rev.student_name || 'Anonymous'}</div>
                            <div class="flex items-center gap-2 mt-0.5">
                                <span class="category-badge ${catClass}">${rev.category || 'Review'}</span>
                                ${rev.rating ? starHTML(rev.rating) : ''}
                            </div>
                        </div>
                    </div>

                    <!-- Image (যদি থাকে) -->
                    ${hasImage ? `
                    <div class="cursor-pointer relative" onclick="openLightbox('${rev.photo_url}')">
                        <img src="${rev.photo_url}"
                             class="review-img"
                             loading="lazy"
                             onerror="this.parentElement.style.display='none'"
                             alt="Review Photo">
                        <div style="position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,0.5);border-radius:8px;padding:4px 10px;color:white;font-size:10px;font-weight:700;">🔍 Tap to zoom</div>
                    </div>` : ''}

                    <!-- Comment -->
                    ${rev.comment ? `
                    <div class="px-5 py-4">
                        <p class="text-gray-600 text-sm leading-relaxed" style="font-style:italic;">"${rev.comment}"</p>
                    </div>` : '<div class="pb-2"></div>'}
                </div>`;
            }).join('');
        }

        function filterReviews(category, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const filtered = category === 'All' ? allReviews : allReviews.filter(r => r.category === category);
            displayReviews(filtered);
        }

        function openLightbox(url) {
            document.getElementById('lightboxImg').src = url;
            document.getElementById('lightbox').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('open');
            document.body.style.overflow = '';
        }

        document.addEventListener('keydown', e => { if(e.key === 'Escape') closeLightbox(); });
    </script>
</body>
</html>
