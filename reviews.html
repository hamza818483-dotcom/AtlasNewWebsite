<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS | Reviews</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #ffffff; }
        .active-filter { background-color: #1e40af !important; color: white !important; }
        /* ছবিকে একদম ফুল স্ক্রিন চওড়া করার জন্য */
        .full-photo { width: 100vw; margin-left: calc(-50vw + 50%); margin-right: calc(-50vw + 50%); }
    </style>
</head>
<body class="pb-10">
    <nav class="bg-white p-5 shadow-sm flex items-center space-x-3 sticky top-0 z-50">
        <button onclick="history.back()" class="bg-gray-100 px-3 py-2 rounded-xl text-blue-800 font-bold">❮</button>
        <span class="font-black text-blue-900 uppercase italic">All Reviews</span>
    </nav>

    <div class="p-4 flex space-x-2 overflow-x-auto sticky top-[72px] bg-white border-b z-40 scrollbar-hide">
        <button onclick="filterReviews('All', this)" class="filter-btn active-filter bg-gray-50 px-5 py-2 rounded-2xl text-[11px] font-bold shadow-sm border">ALL</button>
        <button onclick="filterReviews('Class', this)" class="filter-btn bg-gray-50 px-5 py-2 rounded-2xl text-[11px] font-bold shadow-sm border">CLASS</button>
        <button onclick="filterReviews('Exam', this)" class="filter-btn bg-gray-50 px-5 py-2 rounded-2xl text-[11px] font-bold shadow-sm border">EXAM</button>
        <button onclick="filterReviews('Mentoring', this)" class="filter-btn bg-gray-50 px-5 py-2 rounded-2xl text-[11px] font-bold shadow-sm border">MENTORING</button>
        <button onclick="filterReviews('Service', this)" class="filter-btn bg-gray-50 px-5 py-2 rounded-2xl text-[11px] font-bold shadow-sm border">SERVICE</button>
    </div>

    <main class="w-full" id="reviewContainer">
        </main>

    <script>
        const SUPABASE_URL = 'https://gdmhswxnlhvtyfxaevnt.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkbWhzd3hubGh2dHlmeGFldm50Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MjQyMTQsImV4cCI6MjA5MzIwMDIxNH0.0vDkuK0s6dIYWsgPmvfXXPyalpHNqkm3J--kbhck2PI';
        const atlas = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allReviews = [];
        window.onload = async () => {
            const { data } = await atlas.from('reviews').select('*').order('created_at', {ascending: false});
            if (data) { allReviews = data; displayReviews(allReviews); }
        };

        function displayReviews(reviews) {
            const container = document.getElementById('reviewContainer');
            if(reviews.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-400 py-10 font-bold italic text-xs">কোনো রিভিউ পাওয়া যায়নি!</p>';
                return;
            }

            container.innerHTML = reviews.map(rev => `
                <div class="mb-8 border-b border-gray-100 pb-4">
                    <div class="px-5 py-3 flex items-center justify-between">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 bg-blue-800 rounded-full flex items-center justify-center text-white font-black text-xs uppercase">
                                ${rev.student_name.charAt(0)}
                            </div>
                            <div>
                                <h4 class="font-black text-sm text-gray-900 leading-none">${rev.student_name}</h4>
                                <p class="text-[10px] text-blue-600 font-bold uppercase mt-1 tracking-widest">${rev.category}</p>
                            </div>
                        </div>
                    </div>

                    <div class="w-full bg-gray-50">
                        <img src="${rev.photo_url}" class="w-full h-auto block" loading="lazy">
                    </div>

                    <div class="px-5 mt-3">
                        <p class="text-gray-600 text-xs italic leading-relaxed">"${rev.comment}"</p>
                    </div>
                </div>
            `).join('');
        }

        function filterReviews(category, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active-filter'));
            btn.classList.add('active-filter');
            displayReviews(category === 'All' ? allReviews : allReviews.filter(r => r.category === category));
        }
    </script>
</body>
</html>
