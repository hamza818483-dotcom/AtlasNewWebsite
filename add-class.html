<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS - Add Class</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Sora:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background: #f0f4f8; }
        .logo-font { font-family: 'Sora', sans-serif; }
        .card { background: white; border-radius: 28px; border: 1.5px solid #f1f5f9; }
        .input-style {
            width: 100%; padding: 12px 16px; border-radius: 14px;
            border: 1.5px solid #e2e8f0; font-family: 'Hind Siliguri', sans-serif;
            font-size: 14px; font-weight: 600; outline: none; transition: 0.2s; background: white;
        }
        .input-style:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        .label { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; display: block; }
        /* Select2 style */
        .select2-container .select2-selection--single {
            height: 48px; border-radius: 14px; border: 1.5px solid #e2e8f0;
            display: flex; align-items: center;
        }
        .select2-container--default .select2-selection--single .select2-selection__rendered {
            line-height: 46px; padding-left: 16px; font-family: 'Hind Siliguri'; font-weight: 600; color: #374151;
        }
        .select2-container--default .select2-selection--single .select2-selection__arrow { height: 46px; right: 10px; }
        .select2-container--default.select2-container--focus .select2-selection--single { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); outline: none; }
        .class-row { background: white; border-radius: 20px; border: 1.5px solid #f1f5f9; padding: 16px 20px; display: flex; align-items: center; gap: 12px; transition: 0.2s; }
        .class-row:hover { border-color: #fecaca; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; display: none; align-items: center; justify-content: center; padding: 16px; }
        .modal-overlay.open { display: flex; }
        .modal { background: white; border-radius: 24px; padding: 28px; width: 100%; max-width: 480px; }
        .yt-thumb { width: 80px; height: 52px; border-radius: 10px; object-fit: cover; flex-shrink: 0; background: #fee2e2; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    </style>
</head>
<body class="pb-20">

    <!-- Navbar -->
    <nav class="bg-white px-5 py-4 flex items-center gap-3 sticky top-0 z-50" style="box-shadow:0 2px 20px rgba(0,0,0,0.07)">
        <a href="index.html"><img src="https://i.ibb.co/Vv99z9W/atlas-logo.png" alt="ATLAS" class="w-8 h-8 object-contain" onerror="this.style.display='none'"></a>
        <div>
            <div class="logo-font font-black text-blue-900 text-base">Add Class</div>
            <div class="text-[10px] text-gray-400 font-bold uppercase tracking-wide">Admin Panel</div>
        </div>
        <div class="ml-auto">
            <a href="admin.html" class="text-xs font-bold text-blue-600 border border-blue-200 rounded-xl px-3 py-2">← Admin</a>
        </div>
    </nav>

    <div class="max-w-xl mx-auto px-4 pt-6 pb-16">

        <!-- Add Class Form -->
        <div class="card shadow-xl p-6 mb-8">
            <h2 class="logo-font font-black text-blue-900 text-lg mb-6">📺 নতুন Class Add করো</h2>

            <!-- Subject / Paper / Chapter -->
            <div class="grid grid-cols-1 gap-4 mb-5">
                <div>
                    <label class="label">Subject *</label>
                    <select id="subject" class="subject-suggest" style="width:100%"></select>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="label">Paper</label>
                        <select id="paper" class="input-style">
                            <option value="">— Paper নেই —</option>
                            <option value="1st paper">১ম পত্র</option>
                            <option value="2nd paper">২য় পত্র</option>
                        </select>
                    </div>
                    <div>
                        <label class="label">Chapter *</label>
                        <select id="chapter" class="chapter-suggest" style="width:100%"></select>
                    </div>
                </div>
            </div>

            <!-- YouTube Link -->
            <div class="mb-5">
                <label class="label">YouTube Link *</label>
                <input type="url" id="ytLink" class="input-style" placeholder="https://youtube.com/watch?v=...">
            </div>

            <!-- Preview -->
            <div id="ytPreview" class="hidden mb-5 bg-red-50 rounded-2xl p-4 flex items-center gap-4">
                <div style="width:120px;height:68px;border-radius:12px;background:#fee2e2;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;">▶</div>
                <div>
                    <div class="text-xs text-gray-400 font-bold mb-1">YouTube Preview</div>
                    <a id="ytPreviewLink" href="#" target="_blank" class="text-sm font-bold text-red-700 underline break-all">Link দেখো</a>
                </div>
            </div>

            <!-- Add Button -->
            <button onclick="addClass()" id="addBtn" class="w-full bg-red-600 text-white py-4 rounded-2xl font-black uppercase tracking-widest shadow-xl hover:bg-red-700 transition-colors text-sm">
                📺 Class Add করো
            </button>
        </div>

        <!-- Status -->
        <div id="status" class="hidden p-4 mb-5 rounded-2xl text-center font-bold text-sm"></div>

        <!-- Class List -->
        <div>
            <div class="logo-font font-black text-gray-700 text-sm uppercase tracking-wide mb-4">সব Class — <span id="classCount" class="text-red-600">লোড হচ্ছে...</span></div>
            <div id="classList" class="space-y-3"></div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <h3 class="logo-font font-black text-blue-900 text-lg mb-5">✏️ Class Edit করো</h3>
            <input type="hidden" id="editClassId">
            <div class="grid grid-cols-1 gap-4 mb-5">
                <div>
                    <label class="label">Subject</label>
                    <input type="text" id="editSubject" class="input-style">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="label">Paper</label>
                        <select id="editPaper" class="input-style">
                            <option value="">— নেই —</option>
                            <option value="1st paper">১ম পত্র</option>
                            <option value="2nd paper">২য় পত্র</option>
                        </select>
                    </div>
                    <div>
                        <label class="label">Chapter</label>
                        <input type="text" id="editChapter" class="input-style">
                    </div>
                </div>
                <div>
                    <label class="label">YouTube Link</label>
                    <input type="url" id="editLink" class="input-style">
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="saveEdit()" class="flex-1 bg-blue-900 text-white py-3 rounded-xl font-black text-sm hover:bg-blue-800 transition-colors">✅ Save</button>
                <button onclick="closeModal()" class="flex-1 bg-gray-100 text-gray-700 py-3 rounded-xl font-black text-sm hover:bg-gray-200 transition-colors">বাতিল</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://gdmhswxnlhvtyfxaevnt.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkbWhzd3hubGh2dHlmeGFldm50Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MjQyMTQsImV4cCI6MjA5MzIwMDIxNH0.0vDkuK0s6dIYWsgPmvfXXPyalpHNqkm3J--kbhck2PI';
        const atlas = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        $(document).ready(function() {
            loadMetaData();

            // YouTube link preview
            $('#ytLink').on('input', function() {
                const val = $(this).val().trim();
                if(val.includes('youtube.com') || val.includes('youtu.be')) {
                    $('#ytPreviewLink').attr('href', val).text(val.length > 50 ? val.substring(0,50)+'...' : val);
                    $('#ytPreview').removeClass('hidden');
                } else {
                    $('#ytPreview').addClass('hidden');
                }
            });
        });

        async function loadMetaData() {
            try {
                // Load from both classes and exams for suggestions
                const [classRes, examRes] = await Promise.all([
                    atlas.from('classes').select('subject, paper, chapter'),
                    atlas.from('exams').select('subject, paper, chapter')
                ]);

                const allData = [...(classRes.data||[]), ...(examRes.data||[])];
                const getUnique = (k) => [...new Set(allData.map(e => e[k]).filter(Boolean))];

                $('.subject-suggest').select2({
                    tags: true, placeholder: 'Subject লিখো বা বেছে নাও',
                    data: getUnique('subject').map(v => ({id: v, text: v}))
                });
                $('.chapter-suggest').select2({
                    tags: true, placeholder: 'Chapter লিখো বা বেছে নাও',
                    data: getUnique('chapter').map(v => ({id: v, text: v}))
                });

                renderClasses();
            } catch(err) {
                console.error('Meta Load Error:', err.message);
                renderClasses();
            }
        }

        function showStatus(msg, ok) {
            const s = $('#status');
            s.removeClass('hidden bg-green-100 text-green-800 bg-red-100 text-red-800');
            s.addClass(ok ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800');
            s.text(msg).removeClass('hidden');
            setTimeout(() => s.addClass('hidden'), 4000);
        }

        async function addClass() {
            const btn = $('#addBtn');
            const sub = $('#subject').val();
            const chap = $('#chapter').val();
            const link = $('#ytLink').val().trim();

            if(!sub || !chap || !link) {
                showStatus('❌ Subject, Chapter এবং YouTube Link দরকার!', false);
                return;
            }

            if(!link.includes('youtube.com') && !link.includes('youtu.be')) {
                showStatus('❌ সঠিক YouTube Link দাও', false);
                return;
            }

            try {
                btn.text('⏳ যোগ করা হচ্ছে...').prop('disabled', true);

                const { error } = await atlas.from('classes').insert([{
                    subject: sub,
                    paper: $('#paper').val() || null,
                    chapter: chap,
                    link: link
                }]);

                if(error) throw error;

                showStatus('✅ Class সফলভাবে যোগ হয়েছে!', true);

                // Reset
                $('#subject').val(null).trigger('change');
                $('#chapter').val(null).trigger('change');
                $('#paper').val('');
                $('#ytLink').val('');
                $('#ytPreview').addClass('hidden');

                renderClasses();

            } catch(err) {
                showStatus('❌ Error: ' + err.message, false);
            } finally {
                btn.text('📺 Class Add করো').prop('disabled', false);
            }
        }

        async function renderClasses() {
            const { data } = await atlas.from('classes').select('*').order('created_at', {ascending: false});
            const list = data || [];
            $('#classCount').text(list.length + ' টি');

            if(list.length === 0) {
                $('#classList').html('<div class="text-center py-10 text-gray-400 font-bold">কোনো Class নেই। উপরে Add করো।</div>');
                return;
            }

            $('#classList').html(list.map(cls => {
                const ytId = extractYTId(cls.link || '');
                const thumb = ytId ? `<img src="https://img.youtube.com/vi/${ytId}/mqdefault.jpg" alt="" style="width:80px;height:52px;border-radius:10px;object-fit:cover;flex-shrink:0;">` : `<div style="width:80px;height:52px;border-radius:10px;background:#fee2e2;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;">📺</div>`;
                return `
                <div class="class-row">
                    ${thumb}
                    <div class="flex-1 min-w-0">
                        <div class="font-black text-gray-800 text-sm truncate">${cls.chapter || 'Class'}</div>
                        <div class="flex gap-2 flex-wrap mt-1">
                            ${cls.subject ? `<span style="font-size:10px;font-weight:800;color:#1e40af;background:#eff6ff;border-radius:10px;padding:2px 8px;">${cls.subject}</span>` : ''}
                            ${cls.paper ? `<span style="font-size:10px;font-weight:800;color:#16a34a;background:#f0fdf4;border-radius:10px;padding:2px 8px;">${cls.paper}</span>` : ''}
                        </div>
                    </div>
                    <div class="flex items-center gap-2 flex-shrink-0">
                        <a href="${cls.link||'#'}" target="_blank" class="bg-red-100 text-red-700 text-xs font-black px-3 py-1.5 rounded-xl hover:bg-red-200 transition-colors">▶ Watch</a>
                        <button onclick="openEdit(${JSON.stringify(cls).replace(/"/g,'&quot;')})" class="bg-yellow-100 text-yellow-800 text-xs font-black px-3 py-1.5 rounded-xl hover:bg-yellow-200 transition-colors">Edit</button>
                        <button onclick="deleteClass(${cls.id})" class="bg-red-100 text-red-600 text-xs font-black px-3 py-1.5 rounded-xl hover:bg-red-200 transition-colors">Del</button>
                    </div>
                </div>`;
            }).join(''));
        }

        function extractYTId(url) {
            const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\n?#]+)/);
            return m ? m[1] : null;
        }

        function openEdit(cls) {
            $('#editClassId').val(cls.id);
            $('#editSubject').val(cls.subject || '');
            $('#editPaper').val(cls.paper || '');
            $('#editChapter').val(cls.chapter || '');
            $('#editLink').val(cls.link || '');
            $('#editModal').addClass('open');
        }

        function closeModal() { $('#editModal').removeClass('open'); }

        async function saveEdit() {
            const id = $('#editClassId').val();
            try {
                const { error } = await atlas.from('classes').update({
                    subject: $('#editSubject').val(),
                    paper: $('#editPaper').val() || null,
                    chapter: $('#editChapter').val(),
                    link: $('#editLink').val().trim()
                }).eq('id', id);
                if(error) throw error;
                closeModal();
                showStatus('✅ Class Updated!', true);
                renderClasses();
            } catch(err) {
                showStatus('❌ Error: ' + err.message, false);
            }
        }

        async function deleteClass(id) {
            if(!confirm('⚠️ এই Class মুছে ফেলতে চাও?')) return;
            try {
                const { error } = await atlas.from('classes').delete().eq('id', id);
                if(error) throw error;
                showStatus('✅ Class মুছে গেছে', true);
                renderClasses();
            } catch(err) {
                showStatus('❌ Delete Error: ' + err.message, false);
            }
        }

        $('#editModal').on('click', function(e) { if(e.target === this) closeModal(); });
    </script>
</body>
</html>
