<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS | Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background: #f0f4f8; }
        .input-box { width: 100%; padding: 16px; background: #fff; border-radius: 20px; border: 1px solid #e2e8f0; margin-bottom: 12px; font-weight: bold; outline: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="bg-white p-10 rounded-[3rem] shadow-xl w-full max-w-md text-center border border-gray-100">
        <div class="w-20 h-20 bg-blue-800 rounded-3xl mx-auto mb-6 flex items-center justify-center text-white font-black italic text-4xl shadow-xl shadow-blue-200">A</div>
        <h2 class="text-2xl font-black text-blue-900 mb-2 italic">ATLAS Registration</h2>
        <p class="text-gray-400 font-bold text-[10px] uppercase tracking-widest mb-8">Create your profile to start exam</p>
        
        <input type="text" id="regName" placeholder="Full Name" class="input-box">
        <input type="tel" id="regPhone" placeholder="WhatsApp Number" class="input-box">
        <input type="text" id="regCollege" placeholder="College Name" class="input-box">
        
        <button onclick="registerStudent()" id="regBtn" class="w-full bg-blue-900 text-white py-5 rounded-3xl font-black uppercase tracking-widest shadow-lg mt-4 active:scale-95 transition">Join Now</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://gdmhswxnlhvtyfxaevnt.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkbWhzd3hubGh2dHlmeGFldm50Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MjQyMTQsImV4cCI6MjA5MzIwMDIxNH0.0vDkuK0s6dIYWsgPmvfXXPyalpHNqkm3J--kbhck2PI';
        const atlas = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function registerStudent() {
            const name = regName.value, phone = regPhone.value, college = regCollege.value;
            if(!name || !phone) return alert("সবগুলো তথ্য দাও!");

            const { data, error } = await atlas.from('students').insert([{ name, whatsapp: phone, college }]).select();
            if(!error) {
                localStorage.setItem('atlas_user', JSON.stringify(data[0]));
                // যেখানে যেতে চেয়েছিল সেখানে পাঠিয়ে দিবে
                const lastExam = localStorage.getItem('last_exam_id');
                window.location.href = lastExam ? `exam-hall.html?id=${lastExam}` : 'index.html';
            } else { alert("Error: " + error.message); }
        }
    </script>
</body>
</html>
