<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS | Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Sora:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%); min-height: 100vh; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .inp { width:100%; padding:16px 20px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:16px; color:white; font-family:'Hind Siliguri',sans-serif; font-size:15px; font-weight:600; outline:none; transition:0.3s; }
        .inp:focus { border-color:#3b82f6; background:rgba(59,130,246,0.1); }
        .inp::placeholder { color:rgba(255,255,255,0.4); font-weight:400; }
        .btn-primary { width:100%; padding:18px; background:linear-gradient(135deg,#2563eb,#1d4ed8); border:none; border-radius:20px; color:white; font-family:'Sora',sans-serif; font-size:14px; font-weight:800; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; transition:0.3s; box-shadow:0 10px 30px rgba(37,99,235,0.4); }
        .btn-primary:hover { transform:translateY(-2px); box-shadow:0 15px 40px rgba(37,99,235,0.5); }
        .btn-primary:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
        .logo-font { font-family:'Sora',sans-serif; }
        .star { position:absolute; border-radius:50%; background:rgba(255,255,255,0.6); animation:twinkle 3s infinite; }
        @keyframes twinkle { 0%,100%{opacity:0.3;} 50%{opacity:1;} }
        .label { font-size:12px; font-weight:700; color:rgba(255,255,255,0.6); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:8px; display:block; }
    </style>
</head>
<body class="flex items-center justify-center p-4 relative overflow-hidden">
    <!-- Stars -->
    <div id="stars"></div>

    <div class="glass rounded-[2.5rem] p-8 w-full max-w-md relative z-10">
        <!-- Logo -->
        <a href="index.html" class="flex items-center space-x-3 mb-8">
            <img src="https://i.ibb.co/Vv99z9W/atlas-logo.png" alt="ATLAS" class="w-12 h-12 object-contain" onerror="this.style.display='none'">
            <div>
                <div class="logo-font text-2xl font-black text-white tracking-tight">ATLAS</div>
                <div class="text-xs text-blue-300 font-semibold">পড়াশোনা হোক গোছানো</div>
            </div>
        </a>

        <div class="mb-8">
            <h1 class="logo-font text-xl font-black text-white mb-2">প্রিয় শিক্ষার্থী 👋</h1>
            <p class="text-sm text-blue-200 leading-relaxed">প্রথমবারের মতো নিচের তথ্যগুলো দিন। এরপর থেকে Unlimited Use করতে পারবেন।</p>
        </div>

        <div class="space-y-5" id="regForm">
            <div>
                <label class="label">আপনার নাম কি?</label>
                <input class="inp" id="r_name" type="text" placeholder="পূর্ণ নাম লিখুন">
            </div>
            <div>
                <label class="label">আপনার HSC ব্যাচ কত?</label>
                <input class="inp" id="r_batch" type="text" placeholder="যেমন: ২০২৫">
            </div>
            <div>
                <label class="label">আপনার কলেজের নাম?</label>
                <input class="inp" id="r_college" type="text" placeholder="কলেজের নাম লিখুন">
            </div>
            <div>
                <label class="label">Contact / WhatsApp Number</label>
                <input class="inp" id="r_phone" type="tel" placeholder="01XXXXXXXXX">
            </div>
            <div>
                <label class="label">Telegram / Facebook / Instagram ID Link</label>
                <input class="inp" id="r_social" type="url" placeholder="https://...">
            </div>

            <div id="msgBox" class="hidden p-4 rounded-2xl text-sm font-bold"></div>

            <button class="btn-primary" id="regBtn" onclick="registerStudent()">
                Registration সম্পন্ন করুন →
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://gdmhswxnlhvtyfxaevnt.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkbWhzd3hubGh2dHlmeGFldm50Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MjQyMTQsImV4cCI6MjA5MzIwMDIxNH0.0vDkuK0s6dIYWsgPmvfXXPyalpHNqkm3J--kbhck2PI';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Generate stars
        const starsDiv = document.getElementById('stars');
        for(let i = 0; i < 60; i++) {
            const s = document.createElement('div');
            const size = Math.random() * 3 + 1;
            s.className = 'star';
            s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*3}s;`;
            starsDiv.appendChild(s);
        }

        // Check if already registered
        window.onload = () => {
            const user = localStorage.getItem('atlas_user');
            if(user) {
                const redirect = localStorage.getItem('atlas_redirect') || 'index.html';
                localStorage.removeItem('atlas_redirect');
                window.location.href = redirect;
            }
        };

        function showMsg(msg, isError=false) {
            const box = document.getElementById('msgBox');
            box.className = `p-4 rounded-2xl text-sm font-bold ${isError ? 'bg-red-500/20 text-red-300 border border-red-500/30' : 'bg-green-500/20 text-green-300 border border-green-500/30'}`;
            box.textContent = msg;
            box.classList.remove('hidden');
        }

        async function registerStudent() {
            const name = document.getElementById('r_name').value.trim();
            const batch = document.getElementById('r_batch').value.trim();
            const college = document.getElementById('r_college').value.trim();
            const phone = document.getElementById('r_phone').value.trim();
            const social = document.getElementById('r_social').value.trim();

            if(!name || !batch || !college || !phone) {
                return showMsg('সব তথ্য দেওয়া আবশ্যক!', true);
            }

            const btn = document.getElementById('regBtn');
            btn.disabled = true;
            btn.textContent = 'সেভ হচ্ছে...';

            // Check if phone already registered
            const { data: existing } = await db.from('students').select('id, name, hsc_batch, college, whatsapp').eq('whatsapp', phone).single();
            if(existing) {
                // Already registered, log them in
                const userData = { id: existing.id, name: existing.name, batch: existing.hsc_batch, college: existing.college, phone: existing.whatsapp };
                localStorage.setItem('atlas_user', JSON.stringify(userData));
                showMsg('স্বাগতম! লগইন সম্পন্ন হয়েছে ✓');
                setTimeout(() => {
                    const redirect = localStorage.getItem('atlas_redirect') || 'index.html';
                    localStorage.removeItem('atlas_redirect');
                    window.location.href = redirect;
                }, 1200);
                return;
            }

            const { data, error } = await db.from('students').insert([{
                name, hsc_batch: batch, college, whatsapp: phone, social_link: social
            }]).select().single();

            if(error) {
                showMsg('সমস্যা হয়েছে: ' + error.message, true);
                btn.disabled = false;
                btn.textContent = 'Registration সম্পন্ন করুন →';
                return;
            }

            const userData = { id: data.id, name: data.name, batch: data.hsc_batch, college: data.college, phone: data.whatsapp };
            localStorage.setItem('atlas_user', JSON.stringify(userData));
            showMsg('Registration সফল! ✓ স্বাগতম ' + name);
            setTimeout(() => {
                const redirect = localStorage.getItem('atlas_redirect') || 'index.html';
                localStorage.removeItem('atlas_redirect');
                window.location.href = redirect;
            }, 1200);
        }
    </script>
</body>
</html>
